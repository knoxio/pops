name: Module Registry Quality

on:
  push:
    branches: [main]
    paths:
      - "libs/module-registry/**"
      - "libs/types/**"
      - ".github/workflows/module-registry-quality.yml"
      - ".github/workflows/_pkg-check.yml"
  pull_request:
    paths:
      - "libs/module-registry/**"
      - "libs/types/**"
      - ".github/workflows/module-registry-quality.yml"
      - ".github/workflows/_pkg-check.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'libs/module-registry/**'
              - 'libs/types/**'
              - '.github/workflows/module-registry-quality.yml'
              - '.github/workflows/_pkg-check.yml'

  quality:
    needs: [changes]
    if: always()
    uses: ./.github/workflows/_pkg-check.yml
    with:
      package-path: libs/module-registry
      has-test: true
      needs-db-build: true
      skip: ${{ github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true' }}

  registry-up-to-date:
    name: Registry up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate registry (turbo builds contract deps first per turbo.json ^build)
        run: pnpm turbo run registry:build --filter=@pops/module-registry
      - name: Verify generated.ts is up to date
        run: |
          if ! git diff --exit-code -- libs/module-registry/src/generated.ts; then
            echo ""
            echo "::error::libs/module-registry/src/generated.ts is out of date."
            echo "Run 'pnpm registry:build' locally and commit the result."
            exit 1
          fi
