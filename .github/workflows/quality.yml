name: Quality

# Workspace-wide lint / format / module-boundaries / duplication gate.
# Docs-only PRs (paths under `docs/**` or any `*.md`) cannot break code
# quality, so the whole workflow is excluded from those changes. GitHub
# rulesets with `strict_required_status_checks_policy: false` treat a
# workflow that never triggered as non-blocking, which keeps docs-only
# PRs to ≤ 4 required checks (Theme 13 PRD-220).

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  boundaries:
    name: Module boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:boundaries:verify
      - run: pnpm lint:boundaries

  duplication:
    name: Duplication check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # `apps/pops-api/src/{modules,routes}/food` is the food-pillar migration
      # tombstone: every file there has been lifted into `pillars/food` (the
      # single source of truth) and is deleted in Phase E. Counting the
      # tombstone as the "original" of the lifted code double-penalises the
      # migration, so it's excluded from the duplication scan.
      #
      # The cerebrum migration tombstones follow the same rule: the pillar
      # (`pillars/cerebrum`) is the single source of truth; the surviving
      # monolith `modules/cerebrum` (still hosting the worker runtime, retired
      # in Phase E-2) and the `cerebrum-db`/`cerebrum-contract` packages are
      # excluded too.
      - run: npx jscpd@^4 --threshold 5 --min-lines 8 --min-tokens 70 --ignore "**/*.test.{ts,tsx},**/*.spec.{ts,tsx},**/dist/**,**/node_modules/**,**/*.snap,**/*.d.ts,**/generated.ts,**/db/schema.ts,**/db/seeder.ts,apps/pops-api/src/modules/food/**,apps/pops-api/src/routes/food/**,apps/pops-api/src/modules/cerebrum/**,packages/cerebrum-db/**,packages/cerebrum-contract/**" --reporters "console" --exitCode 0 .
