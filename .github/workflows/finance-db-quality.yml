name: Finance DB Quality

on:
  push:
    branches: [main]
    paths:
      - "packages/finance-contract/**"
      - "packages/finance-db/**"
      - "packages/db-types/**"
      - ".github/workflows/finance-db-quality.yml"
      - ".github/workflows/_pkg-check.yml"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/finance-contract/**'
              - 'packages/finance-db/**'
              - 'packages/db-types/**'
              - '.github/workflows/finance-db-quality.yml'
              - '.github/workflows/_pkg-check.yml'

  quality:
    needs: [changes]
    if: always()
    uses: ./.github/workflows/_pkg-check.yml
    with:
      package-path: packages/finance-db
      needs-db-build: true
      skip: ${{ github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true' }}
