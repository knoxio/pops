name: Release

# Triggers gated to workflow_dispatch only during the pillar-colocation work
# so capivara doesn't pick up half-renamed paths via the tag → publish chain.
# Restore `push: branches: [main]` once the colocation series stabilises.
on:
  workflow_dispatch:

# Only tag pushes and GitHub Release creates; no commits land on main. The repo
# ruleset forbids direct pushes to main, so the workflow is tag-only by design
# and the GitHub Release is the canonical changelog.
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Compute release
        id: compute
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/release.sh

      - name: Tag and publish release
        if: steps.compute.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.compute.outputs.version }}
        run: |
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file release-notes.md
