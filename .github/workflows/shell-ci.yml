name: Shell CI

on:
  push:
    branches: [main]
    paths:
      - "apps/pops-shell/**"
      - "packages/app-*/**"
      - "packages/db-types/**"
      - "packages/ui/**"
      - "packages/widgets/**"
      - "packages/navigation/**"
      - ".github/workflows/shell-ci.yml"
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shell:
              - 'apps/pops-shell/**'
              - 'packages/app-*/**'
              - 'packages/db-types/**'
              - 'packages/ui/**'
              - 'packages/widgets/**'
              - 'packages/navigation/**'
              - '.github/workflows/shell-ci.yml'

  quality:
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.relevant == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: cd packages/db-types && pnpm build

      - name: Type check
        run: cd apps/pops-shell && pnpm typecheck

      - name: Lint
        run: cd apps/pops-shell && pnpm lint

      - name: Build
        run: cd apps/pops-shell && pnpm build
