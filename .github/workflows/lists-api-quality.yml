name: Lists API Quality

on:
  push:
    branches: [main]
    paths:
      - "apps/pops-lists-api/**"
      - "packages/db-types/**"
      - "packages/lists-contract/**"
      - "packages/lists-db/**"
      - "packages/pillar-sdk/**"
      - ".github/workflows/lists-api-quality.yml"
      - ".github/workflows/_pkg-check.yml"
  pull_request:
    paths:
      - "apps/pops-lists-api/**"
      - "packages/db-types/**"
      - "packages/lists-contract/**"
      - "packages/lists-db/**"
      - "packages/pillar-sdk/**"
      - ".github/workflows/lists-api-quality.yml"
      - ".github/workflows/_pkg-check.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/pops-lists-api/**'
              - 'packages/db-types/**'
              - 'packages/lists-contract/**'
              - 'packages/lists-db/**'
              - 'packages/pillar-sdk/**'
              - '.github/workflows/lists-api-quality.yml'
              - '.github/workflows/_pkg-check.yml'

  quality:
    needs: [changes]
    if: always()
    uses: ./.github/workflows/_pkg-check.yml
    with:
      package-path: apps/pops-lists-api
      needs-db-build: true
      skip: ${{ github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true' }}
