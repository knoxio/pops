name: Finance Pillar Quality

# Comprehensive standalone quality gate for the collapsed finance pillar.
# Runs typecheck, test, lint, format, build, OpenAPI generation, and
# Docker build for the finance pillar in isolation. Triggered ONLY by
# changes that touch the pillar or its transitive @pops/* deps + the
# repo-wide tsconfig/lockfile surface.
#
# Bubble-of-happiness rule: this workflow is the one that MUST stay green
# for the finance pillar. Other workflows may be red while the rest of the
# codebase still imports the legacy @pops/finance-* package names — that's
# deliberate and will be resolved as each consumer migrates to
# `@pops/finance`.

on:
  push:
    branches: [main]
    paths:
      - "pillars/finance/**"
      - "packages/pillar-sdk/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".oxfmtrc.json"
      - ".github/workflows/finance-quality.yml"
  pull_request:
    paths:
      - "pillars/finance/**"
      - "packages/pillar-sdk/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".oxfmtrc.json"
      - ".github/workflows/finance-quality.yml"

concurrency:
  group: finance-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Finance pillar — typecheck + test + lint + format + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install (subgraph only)
        run: pnpm install --frozen-lockfile --filter "@pops/finance..."

      - name: Format check
        run: pnpm exec oxfmt --check pillars/finance/

      - name: Lint
        run: pnpm exec oxlint pillars/finance/src

      - name: Build transitive deps
        run: pnpm --filter "@pops/finance^..." build

      - name: Typecheck
        run: pnpm --filter @pops/finance typecheck

      - name: Build pillar
        run: pnpm --filter @pops/finance build

      - name: Verify OpenAPI snapshot is up to date
        run: |
          pnpm --filter @pops/finance generate:openapi
          git diff --exit-code pillars/finance/openapi/finance.openapi.json

      - name: Verify api-types.generated.ts is up to date
        run: |
          pnpm --filter @pops/finance generate:api-types
          git diff --exit-code pillars/finance/src/contract/api-types.generated.ts

      - name: Test
        run: pnpm --filter @pops/finance test

  docker:
    name: Finance pillar — Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build pillar image (builder stage only — fast feedback)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pillars/finance/Dockerfile
          target: builder
          push: false

      - name: Build pillar image (full)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pillars/finance/Dockerfile
          push: false
          tags: pops-finance:${{ github.sha }}
