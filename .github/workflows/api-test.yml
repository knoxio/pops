name: API Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'apps/pops-api/**'
              - 'packages/db-types/**'
              - 'packages/types/**'
              - 'packages/auth/**'
              - '.github/workflows/api-test.yml'

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()

    steps:
      - name: "Skip \u2014 no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No backend changes detected \u2014 skipping tests"

      - name: Checkout code
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd packages/db-types && pnpm build
          cd ../types && pnpm build

      - name: Typecheck
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd apps/pops-api
          pnpm typecheck

      - name: Run unit tests
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd apps/pops-api
          pnpm test --run
        env:
          # Tests use in-memory DB and mocked APIs - no real credentials needed
          CLAUDE_API_KEY: test-key

      - name: Run integration tests
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd apps/pops-api
          pnpm test:integration --run
        env:
          CLAUDE_API_KEY: test-key

  lint-frozen-migrations:
    name: Frozen Migrations Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for new SQL migration files
        run: |
          NEW_SQL=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'apps/pops-api/src/db/migrations/*.sql')
          if [ -n "$NEW_SQL" ]; then
            echo "::error::Manual SQL migrations are frozen. Use Drizzle instead:"
            echo "::error::  1. Edit schema in packages/db-types/src/schema/"
            echo "::error::  2. Run: mise drizzle:generate"
            echo "::error::  3. Review generated SQL in src/db/drizzle-migrations/"
            echo ""
            echo "New .sql files detected:"
            echo "$NEW_SQL"
            exit 1
          fi
          echo "No new SQL migration files — check passed."
