name: E2E Tests

# DISABLED on push/PR (lake-migration). This suite was written against the
# deleted `apps/pops-api` tRPC monolith: every spec mocks/routes `/trpc/**`
# (a surface the REST pillar stack does not serve) and the harness seeded an
# `e2e` named environment via `POST :3000/env/...` (an endpoint that no
# longer exists). The lake is now seven independent REST pillars plus a
# static-built shell, so the suite cannot pass without a full rewrite against
# the REST stack — out of scope for the workflow-repair pass.
#
# Until that rewrite lands, the workflow is `workflow_dispatch` only so it
# never gates CI by booting a deleted backend. Manual runs still build the
# shell and start Playwright's shell webServers for ad-hoc investigation;
# specs that depend on the deleted tRPC API will fail and that is expected.
#
# Follow-up: TODO(e2e-rest-rewrite) — rewrite the specs against the REST
# pillars and re-enable push/pull_request triggers here.
on:
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Playwright E2E Tests (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter "@pops/shell^..." --filter "!./apps/*" build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          cd apps/pops-shell
          npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          cd apps/pops-shell
          npx playwright install-deps

      - name: Run Playwright tests
        run: |
          cd apps/pops-shell
          # Boots the two shell webServers defined in playwright.config.ts:
          #   - chromium-all-modules — canonical workspace registry
          #   - chromium-finance-only — POPS_APPS=finance,core registry snapshot
          # There is no longer a pops-api webServer; specs that target the
          # deleted /trpc surface fail by design until the REST rewrite.
          pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/pops-shell/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: apps/pops-shell/test-results/
          retention-days: 7
