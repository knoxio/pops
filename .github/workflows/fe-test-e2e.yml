name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            e2e:
              - 'apps/pops-shell/**'
              - 'apps/pops-api/**'
              - 'packages/**'
              - '.github/workflows/fe-test-e2e.yml'

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    timeout-minutes: 30

    steps:
      - name: "Skip \u2014 no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No app/package changes detected \u2014 skipping E2E tests"

      - name: Checkout code
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd packages/db-types && pnpm build
          cd ../types && pnpm build

      - name: Cache Playwright browsers
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: (github.event_name == 'push' || needs.changes.outputs.relevant == 'true') && steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          cd apps/pops-shell
          npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: (github.event_name == 'push' || needs.changes.outputs.relevant == 'true') && steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          cd apps/pops-shell
          npx playwright install-deps

      - name: Initialize pops-api database
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-api && pnpm dev:init
        env:
          SQLITE_PATH: ./data/pops.db

      - name: Run Playwright tests
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd apps/pops-shell
          pnpm test:e2e
        env:
          CI: true
          # pops-api is started by Playwright's webServer config.
          # These dummy values satisfy validation. Integration tests use named
          # envs (?env=e2e), which automatically skip external API calls —
          # no real network traffic is made during E2E tests.
          CLAUDE_API_KEY: test-dummy-key
          # Path is relative to the API server's working directory (apps/pops-api)
          SQLITE_PATH: ./data/pops.db

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always() && (github.event_name == 'push' || needs.changes.outputs.relevant == 'true')
        with:
          name: playwright-report
          path: apps/pops-shell/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v7
        if: failure() && (github.event_name == 'push' || needs.changes.outputs.relevant == 'true')
        with:
          name: playwright-screenshots
          path: apps/pops-shell/test-results/
          retention-days: 7
