name: Rust Quality

# Self-contained Rust CI lane for the repo-root cargo workspace and the Rust
# pillars it builds (currently `pillars/contacts`, the first Rust pillar).
#
# ADDITIVE by design: it is path-filtered to the Rust tree and runs the whole
# cargo workspace (no matrix). The per-crate changed-only Rust legs live in
# `unit-quality.yml`. Rust pillars carry no `package.json`, so the pnpm pillar
# discovery never sees them. Adding a Rust crate to the workspace
# `Cargo.toml` (e.g. `pops-ai`, `pops-settings`) is covered here with no
# workflow edit because every step operates on the whole workspace.
#
# Caching uses `actions/cache` (already on the repo's allow-list) rather than a
# third-party Rust cache action so the workflow starts under org action policy.

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "libs/pops-ai/**"
      - "libs/pops-settings/**"
      - "pillars/contacts/**"
      - "scripts/extractability/**"
      - ".github/workflows/rust-quality.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "libs/pops-ai/**"
      - "libs/pops-settings/**"
      - "pillars/contacts/**"
      - "scripts/extractability/**"
      - ".github/workflows/rust-quality.yml"

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: fmt + clippy + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable
          rustc --version
          cargo --version

      # Node powers the crate-boundary guard (scripts/extractability/
      # check-cargo-deps.mjs). Pinned to 22 to match the TS lanes.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache cargo registry + workspace target + installed tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'pillars/contacts/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Crate-boundary + supply-chain gate (federation isolation, P6-T04):
      #   - cargo deny: licence / advisory / source policy over the whole graph
      #     (config: deny.toml at repo root).
      #   - check-cargo-deps.mjs: a lib crate must not depend on a pillar crate,
      #     and no pillar may depend on another pillar (RUST-2a/2b).
      # `--locked` keeps the cargo-deny install reproducible; the binary is
      # cached in ~/.cargo/bin across runs, so the `cargo install` is a no-op
      # after first build. NON-required — additive gate, the ruleset is untouched.
      - name: Boundaries + supply chain
        run: |
          cargo install cargo-deny --locked
          cargo deny check
          node scripts/extractability/check-cargo-deps.mjs --self-test
          node scripts/extractability/check-cargo-deps.mjs

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all

      - name: OpenAPI spec is current (3.0 emission drift gate)
        run: |
          spec="pillars/contacts/openapi/contacts.openapi.json"

          # A missing or untracked spec must FAIL, not pass vacuously. `git
          # diff` alone ignores untracked files, so a never-committed spec
          # would slip through silently. Assert the file is tracked first.
          if ! git ls-files --error-unmatch "$spec" >/dev/null 2>&1; then
            echo "::error::$spec is not committed. Run 'cargo run -p contacts --bin emit-openapi' and commit the result."
            exit 1
          fi

          cargo run -p contacts --bin emit-openapi

          if [ ! -s "$spec" ]; then
            echo "::error::$spec is empty after emission — the generator produced no document."
            exit 1
          fi

          # Drift gate: the freshly emitted spec must equal the committed one.
          if ! git diff --exit-code -- "$spec"; then
            echo "::error::$spec is out of date."
            echo "Run 'cargo run -p contacts --bin emit-openapi' and commit the result."
            exit 1
          fi
