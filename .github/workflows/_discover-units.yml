name: Discover Units

# Reusable disk-discovery of every buildable unit under `pillars/` + `libs/`
# (maxdepth 1). A unit is any such dir carrying a recognised manifest:
#   - `package.json`                     -> lang=ts,   pkg = package.json#name
#   - `Cargo.toml` with a `[package]`    -> lang=rust, pkg = crate [package].name
# Manifest-less dirs (moltbot, workspace stubs, stale build-only dirs) are
# skipped. `kind` = pillar|lib by root. `name` is the dir basename and is a
# display/path key ONLY — never a `pnpm --filter` / `cargo -p` selector
# (libs/sdk publishes @pops/pillar-sdk; the dir-name != pkg-name skew is
# LOCKED — selecting on the basename silently matches zero packages).
#
# SCOPE — `maxdepth 1` is deliberate, NOT an oversight. The nested
# `pillars/*/app` frontend members (real pnpm workspace members per
# `pnpm-workspace.yaml` `pillars/*/*`, npm name `@pops/app-<id>`) live at
# maxdepth 2 and collide on basename `app`, so they are intentionally OUT of
# this discovery and OUT of `unit-quality.yml`'s matrix. They are covered by
# two complementary lanes, with NO double-coverage of any one check:
#   - `app-quality.yml` runs EACH app's OWN `typecheck` + `test` suite via its
#     own disk-discovered matrix (the ~180 standalone vitest files that nothing
#     else runs). This is the unit-test lane the apps were missing.
#   - ALL `@pops/app-*` are static deps of `@pops/shell` (see its
#     package.json + `pillars/shell/src/app/bundle-map.tsx`), so
#     `fe-quality.yml`'s shell typecheck + build compile every app's source
#     transitively in the assembled SPA. `bundle-map-coverage` (RD-10) asserts
#     every app appears in that map, which is what makes "the shell build
#     reaches every app" provable rather than assumed.
# The `assert-app-coverage` job below turns this from a comment into a gate:
# it enumerates the `pillars/*/app` members on disk and FAILS if any one is
# not routed to BOTH covering workflows — so a newly added pillar app whose
# coverage was forgotten breaks discovery loudly instead of shipping untested.
#
# Outputs:
#   units   — every discovered unit (full list)
#   changed — units touched by this PR's diff, OR all units when a shared
#             root (lockfile / base tsconfig / formatter / mise root / Cargo
#             root) changed. Drives the unit-quality matrix.

on:
  workflow_call:
    outputs:
      units:
        value: ${{ jobs.list.outputs.units }}
      changed:
        value: ${{ jobs.list.outputs.changed }}

jobs:
  list:
    name: Discover units from disk
    runs-on: ubuntu-latest
    outputs:
      units: ${{ steps.scan.outputs.units }}
      changed: ${{ steps.scan.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need merge-base for changed-detection

      - id: scan
        name: Scan pillars/ + libs/ and compute changed set
        run: |
          set -euo pipefail

          # $1 = Cargo.toml path; read [package] name, blank if none.
          crate_name() {
            awk '/^\[package\]/{p=1;next} /^\[/{p=0} p&&/^name[[:space:]]*=/{gsub(/.*=[[:space:]]*"|"[[:space:]]*$/,"");print;exit}' "$1"
          }

          # $1 = root (pillars|libs); emit one JSON object per discovered unit.
          emit() {
            root="$1"
            [ -d "$root" ] || return 0
            find "$root" -mindepth 1 -maxdepth 1 -type d | sort | while read -r d; do
              kind=$([ "$root" = pillars ] && echo pillar || echo lib)
              if   [ -f "$d/package.json" ]; then
                lang=ts; pkg=$(jq -r '.name' "$d/package.json")
              elif [ -f "$d/Cargo.toml" ] && grep -q '^\[package\]' "$d/Cargo.toml"; then
                lang=rust; pkg=$(crate_name "$d/Cargo.toml")
              else
                continue # manifest-less dir (moltbot, workspace stubs) — skip
              fi
              [ -n "$pkg" ] && [ "$pkg" != null ] || { echo "::error::no pkg name for $d" >&2; exit 1; }
              jq -n --arg n "$(basename "$d")" --arg pkg "$pkg" --arg dir "$d" \
                    --arg k "$kind" --arg l "$lang" \
                    '{name:$n,pkg:$pkg,dir:$dir,kind:$k,lang:$l}'
            done
          }

          units=$( { emit pillars; emit libs; } | jq -s -c '.')
          echo "units=$units" >> "$GITHUB_OUTPUT"
          echo "Discovered units:"
          echo "$units" | jq .

          base=$(git merge-base "origin/${{ github.base_ref || 'main' }}" HEAD || echo HEAD~1)
          diff=$(git diff --name-only "$base" HEAD)
          echo "Changed files vs $base:"
          echo "$diff"

          # A shared-root touch invalidates everything (lockfile / base
          # tsconfig / formatter / linter / mise root / cargo root) -> build ALL.
          if echo "$diff" | grep -qE '^(pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig\.base\.json|tsconfig\.build\.json|\.oxfmtrc\.json|\.oxlintrc\.json|mise\.toml|mise\.ci\.toml|Cargo\.toml|Cargo\.lock)$'; then
            echo "Shared root changed — building ALL units."
            echo "changed=$units" >> "$GITHUB_OUTPUT"
          else
            changed=$(DIFF="$diff" jq -c -n --argjson units "$units" \
              '$units | [.[] | select(.dir as $d | ($ENV.DIFF | test("(^|\\n)"+$d+"/")))]')
            echo "Changed units:"
            echo "$changed" | jq .
            echo "changed=$changed" >> "$GITHUB_OUTPUT"
          fi

  assert-app-coverage:
    # Proves the maxdepth-1 scope above leaves NO `pillars/*/app` member
    # uncovered. Each such member (npm name `@pops/app-<id>`) is excluded from
    # the unit matrix by design; this job fails loud if any one is not routed
    # to BOTH its own unit lane (app-quality.yml) AND fe-quality's shell build,
    # so "every unit is covered" is a gate, not a hope. Pure disk + workflow-
    # file reads — no install.
    name: Assert pillars/*/app are routed to app-quality + fe-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Every pillars/*/app is named @pops/app-* and covered by both lanes
        run: |
          set -euo pipefail

          fe=.github/workflows/fe-quality.yml
          [ -f "$fe" ] || { echo "::error::$fe missing — pillars/*/app lose their build coverage"; exit 1; }

          # fe-quality's shell typecheck + build compile every @pops/app-* via
          # the shell's static deps; this glob is what fires that build on any
          # app change. If it is ever dropped, app changes ship untested.
          grep -qE '^\s*-\s*["'\'']?pillars/\*/app/\*\*' "$fe" \
            || { echo "::error::$fe no longer triggers on 'pillars/*/app/**' — app build coverage lost"; exit 1; }

          # app-quality runs each app's OWN typecheck + test via a disk-
          # discovered matrix; the same glob is what fires it on any app
          # change. This is the unit-test lane the apps were missing.
          aq=.github/workflows/app-quality.yml
          [ -f "$aq" ] || { echo "::error::$aq missing — pillars/*/app lose their own typecheck+test lane"; exit 1; }
          grep -qE '^\s*-\s*["'\'']?pillars/\*/app/\*\*' "$aq" \
            || { echo "::error::$aq no longer triggers on 'pillars/*/app/**' — app unit-test coverage lost"; exit 1; }

          missing=0
          while IFS= read -r appdir; do
            [ -f "$appdir/package.json" ] || continue
            pkg=$(jq -r '.name' "$appdir/package.json")
            case "$pkg" in
              @pops/app-*) : ;;
              *) echo "::error::$appdir is a nested workspace member named '$pkg' (expected @pops/app-*); unit-discovery does not see maxdepth-2 members — give it explicit coverage or fix the name"; missing=1; continue ;;
            esac
            # Both lanes discover apps from disk by the @pops/app-* name, so a
            # correctly named member is automatically picked up by each — the
            # glob assertions above guarantee both fire on app changes.
            echo "$pkg -> app-quality.yml (own typecheck+test) + fe-quality (shell build)"
          done < <(find pillars -mindepth 2 -maxdepth 2 -type d -name app | sort)

          [ "$missing" = 0 ] || { echo "::error::one or more pillars/*/app members are uncovered"; exit 1; }
          echo "All pillars/*/app members are routed to app-quality + fe-quality."
