name: FE Quality

on:
  push:
    branches: [main]
    paths:
      - "pillars/shell/**"
      - "pillars/*/app/**"
      # Every pillar's OpenAPI projection feeds the generated FE client.
      # Globbed from disk so a new pillar (or `lists`, previously omitted)
      # is covered without editing this list.
      - "pillars/*/openapi/**"
      - "libs/db-types/**"
      - "libs/navigation/**"
      - "libs/sdk/**"
      - "libs/types/**"
      - "libs/ui/**"
      - ".github/workflows/fe-quality.yml"
  pull_request:
    paths:
      - "pillars/shell/**"
      - "pillars/*/app/**"
      - "pillars/*/openapi/**"
      - "libs/db-types/**"
      - "libs/navigation/**"
      - "libs/sdk/**"
      - "libs/types/**"
      - "libs/ui/**"
      - ".github/workflows/fe-quality.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shell:
              - 'pillars/shell/**'
              - 'pillars/*/app/**'
              - 'libs/db-types/**'
              # Glob every pillar's OpenAPI projection so the filter can't
              # drift from the trigger paths (previously omitted inventory
              # + lists, silently skipping FE quality on those changes).
              - 'pillars/*/openapi/**'
              - 'libs/navigation/**'
              - 'libs/sdk/**'
              - 'libs/types/**'
              - 'libs/ui/**'
              - '.github/workflows/fe-quality.yml'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no relevant changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No shell/UI changes detected — skipping quality checks"

      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm --filter "@pops/shell^..." --filter "!./pillars/*/app" build

      - name: Type check
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd pillars/shell && pnpm typecheck

      # The committed nginx.conf is the prod BOOT FALLBACK (PRD-255). Gate it
      # for drift here, not only via the Vitest snapshot, so a stale fallback
      # fails the build.
      - name: nginx fallback conf drift gate
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd pillars/shell && pnpm gen:nginx:check

      - name: Test
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd pillars/shell && pnpm test

      - name: Build
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd pillars/shell && pnpm build
