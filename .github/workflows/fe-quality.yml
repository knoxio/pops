name: FE Quality

on:
  push:
    branches: [main]
    paths:
      - "apps/pops-shell/**"
      - "packages/app-*/**"
      - "packages/cerebrum-db/**"
      - "packages/db-types/**"
      - "packages/finance-contract/**"
      - "packages/food-db/**"
      - "packages/inventory-db/**"
      - "packages/lists-db/**"
      - "packages/pillar-sdk/**"
      - "packages/ui/**"
      - "packages/api-client/**"
      - "packages/widgets/**"
      - "packages/navigation/**"
      - "packages/types/**"
      - ".github/workflows/fe-quality.yml"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shell:
              - 'apps/pops-shell/**'
              - 'packages/app-*/**'
              - 'packages/cerebrum-db/**'
              - 'packages/db-types/**'
              - 'packages/finance-contract/**'
              - 'packages/food-db/**'
              - 'packages/inventory-db/**'
              - 'packages/lists-db/**'
              - 'packages/pillar-sdk/**'
              - 'packages/ui/**'
              - 'packages/api-client/**'
              - 'packages/widgets/**'
              - 'packages/navigation/**'
              - 'packages/types/**'
              - '.github/workflows/fe-quality.yml'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no relevant changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No shell/UI changes detected — skipping quality checks"

      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd packages/db-types && pnpm build
          cd ../types && pnpm build
          cd ../module-registry && pnpm build
          cd ../food-contracts && pnpm build
          cd ../core-db && pnpm build
          cd ../finance-db && pnpm build
          cd ../inventory-db && pnpm build
          cd ../media-db && pnpm build
          cd ../cerebrum-db && pnpm build
          cd ../food-db && pnpm build
          cd ../lists-db && pnpm build
          cd ../app-lists-db && pnpm build
          cd ../app-food-db && pnpm build
          cd ../finance-contract && pnpm build
          cd ../pillar-sdk && pnpm build

      - name: Type check
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-shell && pnpm typecheck

      - name: Test
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-shell && pnpm test

      - name: Build
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-shell && pnpm build
