name: FE Quality

on:
  push:
    branches: [main]
    paths:
      - "apps/pops-shell/**"
      - "packages/api-client/**"
      - "packages/app-*/**"
      - "packages/cerebrum-db/**"
      - "packages/*-contract/**"
      - "pillars/lists/contract/**"
      - "pillars/inventory/openapi/**"
      - "pillars/finance/openapi/**"
      - "pillars/food/openapi/**"
      - "packages/db-types/**"
      - "packages/food-db/**"
      - "packages/inventory-db/**"
      - "pillars/lists/db/**"
      - "packages/navigation/**"
      - "packages/pillar-sdk/**"
      - "packages/types/**"
      - "packages/ui/**"
      - "packages/widgets/**"
      - ".github/workflows/fe-quality.yml"
  pull_request:
    paths:
      - "apps/pops-shell/**"
      - "packages/api-client/**"
      - "packages/app-*/**"
      - "packages/cerebrum-db/**"
      - "packages/*-contract/**"
      - "pillars/lists/contract/**"
      - "pillars/inventory/openapi/**"
      - "pillars/finance/openapi/**"
      - "pillars/food/openapi/**"
      - "packages/db-types/**"
      - "packages/food-db/**"
      - "packages/inventory-db/**"
      - "pillars/lists/db/**"
      - "packages/navigation/**"
      - "packages/pillar-sdk/**"
      - "packages/types/**"
      - "packages/ui/**"
      - "packages/widgets/**"
      - ".github/workflows/fe-quality.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shell:
              - 'apps/pops-shell/**'
              - 'packages/api-client/**'
              - 'packages/app-*/**'
              - 'packages/cerebrum-db/**'
              - 'packages/*-contract/**'
              - 'packages/db-types/**'
              - 'packages/food-db/**'
              - 'packages/inventory-db/**'
              - 'pillars/finance/openapi/**'
              - 'pillars/food/openapi/**'
              - 'pillars/lists/db/**'
              - 'pillars/lists/contract/**'
              - 'packages/navigation/**'
              - 'packages/pillar-sdk/**'
              - 'packages/types/**'
              - 'packages/ui/**'
              - 'packages/widgets/**'
              - '.github/workflows/fe-quality.yml'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no relevant changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No shell/UI changes detected — skipping quality checks"

      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm --filter "@pops/shell^..." --filter "!./apps/*" build

      - name: Type check
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-shell && pnpm typecheck

      - name: Test
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-shell && pnpm test

      - name: Build
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-shell && pnpm build
