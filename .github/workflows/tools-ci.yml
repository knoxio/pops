name: Tools CI

on:
  pull_request:
    paths:
      - 'packages/import-tools/**'
      - '.github/workflows/tools-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/import-tools/**'
      - '.github/workflows/tools-ci.yml'

defaults:
  run:
    working-directory: packages/import-tools

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Run tests
        run: pnpm test
