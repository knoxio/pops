name: Publish Images

# Triggers gated to workflow_dispatch only during the pillar-colocation work
# so Watchtower on capivara doesn't roll forward to a half-migrated image.
# Restore `push: branches: [main]` + `tags: ["v*"]` once the colocation
# series stabilises.
on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata for pops-api
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/knoxio/pops-api
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=v{{major}}

      - name: Build and push pops-api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/pops-api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}

      - name: Generate metadata for pops-shell
        id: meta-shell
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/knoxio/pops-shell
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
