name: Publish Images

# Triggers gated to workflow_dispatch only during the pillar-colocation work
# so Watchtower on capivara doesn't roll forward to a half-migrated image.
# Restore `push: branches: [main]` + `tags: ["v*"]` once the colocation
# series stabilises.
on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Build only this image (e.g. pops-registry or registry); empty = all (full fleet)'
        required: false
        default: ''
        type: string

permissions:
  packages: write
  contents: read

jobs:
  apps:
    name: Build and push ${{ matrix.app.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Frontend + tooling images that build from an apps/ Dockerfile
        # rather than a pillar. Pillars are published by the `pillars` job
        # below from their colocated `pillars/<x>/Dockerfile`.
        app:
          - { image: pops-shell, file: pillars/shell/Dockerfile }
          - { image: pops-mcp, file: pillars/mcp/Dockerfile }
          - { image: pops-orchestrator, file: pillars/orchestrator/Dockerfile }
          - { image: pops-docs, file: pillars/docs/Dockerfile }
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata for ${{ matrix.app.image }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/knoxio/${{ matrix.app.image }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=v{{major}}

      - name: Build and push ${{ matrix.app.image }}
        if: ${{ inputs.only == '' || inputs.only == matrix.app.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.app.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}

  discover:
    name: Discover publishable pillars
    runs-on: ubuntu-latest
    outputs:
      pillars: ${{ steps.list.outputs.pillars }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        name: Enumerate pillars published from the prod compose
        # A pillar is publishable iff infra/docker-compose.yml pins it to a
        # `ghcr.io/knoxio/pops-<x>` image AND a hand-written
        # `pillars/<x>/Dockerfile` exists to build it from. This keeps the
        # publish set in lockstep with compose's `image:` refs — adding a
        # pillar image to compose makes it publish here with no workflow
        # edit. Services whose Dockerfile lives under `apps/` rather than
        # `pillars/<x>/` (orchestrator, docs) are published by the `apps`
        # job above instead, so they're excluded here by the Dockerfile
        # existence check even though they pin an `image:` ref.
        run: |
          set -euo pipefail
          mapfile -t pillars < <(
            grep -oE 'image: ghcr\.io/knoxio/pops-[a-z]+:' infra/docker-compose.yml \
              | sed -E 's#image: ghcr\.io/knoxio/pops-([a-z]+):#\1#' \
              | sort -u \
              | while read -r p; do [ -f "pillars/$p/Dockerfile" ] && echo "$p"; done
          )
          json=$(printf '%s\n' "${pillars[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          only='${{ inputs.only }}'
          if [ -n "$only" ]; then
            json=$(echo "$json" | jq -c --arg p "${only#pops-}" 'map(select(. == $p))')
          fi
          count=$(echo "$json" | jq 'length')
          echo "pillars=$json" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count publishable pillar(s): $json"

  pillars:
    name: Build and push pops-${{ matrix.pillar }}
    needs: [discover]
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every served pillar publishes a single `pops-<x>` image built from
        # its hand-written `pillars/<x>/Dockerfile`. The food worker reuses
        # the `pops-food` image with a runtime command override (see the
        # food Dockerfile + the worker service), so it needs no separate
        # publish.
        pillar: ${{ fromJson(needs.discover.outputs.pillars) }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata for pops-${{ matrix.pillar }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/knoxio/pops-${{ matrix.pillar }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=v{{major}}

      - name: Build and push pops-${{ matrix.pillar }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: pillars/${{ matrix.pillar }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
