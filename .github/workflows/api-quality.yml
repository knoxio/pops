name: API Quality

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "apps/pops-api/**"
      - "packages/db-types/**"
      - "packages/types/**"
      - ".github/workflows/api-quality.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/pops-api/**'
              - 'packages/db-types/**'
              - 'packages/types/**'
              - '.github/workflows/api-quality.yml'

  quality-checks:
    name: quality
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()

    steps:
      - name: Skip — no relevant changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No API changes detected — skipping quality checks"

      - name: Checkout repository
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: |
          cd packages/db-types && pnpm build
          cd ../types && pnpm build

      - name: Type check
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-api && pnpm typecheck

      - name: Validate OpenAPI spec
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-api && pnpm openapi:validate

      - name: Run unit tests
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-api && pnpm test

      - name: Run integration tests
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-api && pnpm test:integration

      - name: Build
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: cd apps/pops-api && pnpm build

      - name: Upload build artifacts
        if: success() && (github.event_name == 'push' || needs.changes.outputs.relevant == 'true')
        uses: actions/upload-artifact@v7
        with:
          name: pops-api-build
          path: apps/pops-api/dist
          retention-days: 7
