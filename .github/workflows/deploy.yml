name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
      deploy_needed: ${{ steps.filter.outputs.deploy_needed }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/pops-shell/**'
              - 'packages/app-*/**'
              - 'packages/ui/**'
              - 'packages/widgets/**'
              - 'packages/navigation/**'
            backend:
              - 'apps/pops-api/**'
              - 'packages/db-types/**'
              - 'packages/types/**'
              - 'packages/auth/**'
            infra:
              - 'infra/**'
              - 'apps/pops-shell/nginx.conf'
              - 'docker-compose*'
            deploy_needed:
              - '!docs/**'
              - '!.github/**'
              - '!*.md'

  # Quality checks run in parallel for faster feedback
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy_needed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy_needed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy_needed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy_needed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # Deploy to N95 server
  # Note: This job expects a self-hosted runner on the N95 server
  # See docs/DEPLOYMENT.md for setup instructions
  deploy:
    name: Deploy to N95
    runs-on: self-hosted
    needs: [changes, lint, typecheck, test, build]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy_needed == 'true'
    environment:
      name: production
      url: https://pops.jmiranda.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set deployment mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ needs.changes.outputs.infra }}" == "true" ]; then
            echo "type=full" >> $GITHUB_OUTPUT
            echo "🚀 Full Ansible deployment"
          elif [ "${{ needs.changes.outputs.frontend }}" == "true" ] && [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            echo "type=selective" >> $GITHUB_OUTPUT
            echo "target=both" >> $GITHUB_OUTPUT
            echo "⚡ Selective deployment (Frontend + Backend)"
          elif [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            echo "type=selective" >> $GITHUB_OUTPUT
            echo "target=frontend" >> $GITHUB_OUTPUT
            echo "⚡ Selective deployment (Frontend only)"
          elif [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            echo "type=selective" >> $GITHUB_OUTPUT
            echo "target=backend" >> $GITHUB_OUTPUT
            echo "⚡ Selective deployment (Backend only)"
          else
            echo "type=full" >> $GITHUB_OUTPUT
            echo "🚀 Fallback: Full Ansible deployment (Unknown changes)"
          fi

      - name: Run Ansible deployment
        if: steps.mode.outputs.type == 'full'
        run: |
          cd infra/ansible
          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.yml \
            --vault-password-file ~/.ansible/pops-vault-password \
            --connection=local \
            -v

      - name: "Selective deploy: Build + Restart"
        if: steps.mode.outputs.type == 'selective'
        id: selective
        run: |
          # The self-hosted runner is on the N95
          # Docker context is repo root
          cd /opt/pops

          if [ "${{ steps.mode.outputs.target }}" == "frontend" ] || [ "${{ steps.mode.outputs.target }}" == "both" ]; then
            echo "📦 Building pops-shell..."
            docker compose build pops-shell
            echo "🔄 Restarting pops-shell..."
            docker compose up -d pops-shell
          fi

          if [ "${{ steps.mode.outputs.target }}" == "backend" ] || [ "${{ steps.mode.outputs.target }}" == "both" ]; then
            echo "📦 Building pops-api..."
            docker compose build pops-api
            echo "🔄 Restarting pops-api..."
            docker compose up -d pops-api
          fi

      - name: Verify health
        id: health
        continue-on-error: true
        run: |
          check_health() {
            local container=$1 url=$2
            for i in $(seq 1 6); do
              if docker exec "$container" wget -qO- "$url" > /dev/null 2>&1; then
                echo "✅ $container healthy"
                return 0
              fi
              echo "⏳ $container not ready (attempt $i/6)..."
              sleep 10
            done
            echo "❌ $container health check failed after 60s"
            return 1
          }

          if [ "${{ steps.mode.outputs.type }}" == "full" ] || [ "${{ steps.mode.outputs.target }}" == "backend" ] || [ "${{ steps.mode.outputs.target }}" == "both" ]; then
            check_health pops-api http://localhost:3000/health
          fi

          if [ "${{ steps.mode.outputs.type }}" == "full" ] || [ "${{ steps.mode.outputs.target }}" == "frontend" ] || [ "${{ steps.mode.outputs.target }}" == "both" ]; then
            check_health pops-shell http://localhost
          fi

      - name: Fail on full deploy health check failure
        if: steps.health.outcome == 'failure' && steps.mode.outputs.type == 'full'
        run: |
          echo "❌ Health check failed on full deploy — no fallback available"
          exit 1

      - name: Fallback to full deploy on selective failure
        if: steps.mode.outputs.type == 'selective' && steps.health.outcome == 'failure'
        run: |
          echo "⚠️ Selective deploy failed health check. Falling back to full Ansible deploy..."
          cd infra/ansible
          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.yml \
            --vault-password-file ~/.ansible/pops-vault-password \
            --connection=local \
            -v

      - name: Final health check after fallback
        if: steps.mode.outputs.type == 'selective' && steps.health.outcome == 'failure'
        run: |
          sleep 20
          cd /opt/pops
          docker exec pops-api wget -qO- http://localhost:3000/health > /dev/null 2>&1
          docker exec pops-shell wget -qO- http://localhost > /dev/null 2>&1

      - name: Show deployment summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deployment Status: ${{ job.status }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cd /opt/pops
          docker compose ps
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Upload logs on failure
        if: failure()
        run: |
          cd /opt/pops
          docker compose logs --tail=200 > /tmp/deployment-logs.txt
          cat /tmp/deployment-logs.txt
