name: Pillar Images

# Validates per-pillar container builds (ADR-026). Discovers pillars by
# globbing both `packages/*-api/package.json` (pre-colocation) and
# `pillars/*/api/package.json` (post-colocation, PRD-253) so adding or
# relocating a pillar requires no workflow edit.
#
# On PRs: builds the `builder` stage only (fast feedback, no push).
# On main: full image build (still no push — publishing is gated on
# `publish-images.yml` once pillar images need to ship to GHCR).

on:
  pull_request:
    paths:
      - 'apps/pops-*-api/**'
      - 'packages/*-api/**'
      - 'packages/*-db/**'
      - 'packages/*-contract/**'
      - 'packages/db-types/**'
      - 'packages/types/**'
      - 'packages/module-registry/**'
      - 'pillars/*/**'
      - 'infra/docker/pillar.Dockerfile'
      - 'infra/docker-compose*.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/pillar-images.yml'
  push:
    branches: [main]
    paths:
      - 'apps/pops-*-api/**'
      - 'packages/*-api/**'
      - 'packages/*-db/**'
      - 'packages/*-contract/**'
      - 'packages/db-types/**'
      - 'packages/types/**'
      - 'packages/module-registry/**'
      - 'pillars/*/**'
      - 'infra/docker/pillar.Dockerfile'
      - 'infra/docker-compose*.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/pillar-images.yml'

jobs:
  discover:
    name: Discover pillars
    runs-on: ubuntu-latest
    outputs:
      pillars: ${{ steps.list.outputs.pillars }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        name: Enumerate pillar -api packages
        # A pillar's api package lives at either
        # `packages/<domain>-api/package.json` (pre-colocation) or
        # `pillars/<domain>/api/package.json` (post-colocation, PRD-253).
        # Both layouts can coexist during the pillar-by-pillar move.
        # Anything else is ignored — `app-food-db` etc. is a pre-pillar
        # extraction and not yet a pillar.
        run: |
          set -euo pipefail
          mapfile -t legacy < <(find packages -maxdepth 2 -type f -name package.json -path 'packages/*-api/package.json' 2>/dev/null | sort)
          mapfile -t colocated < <(find pillars -maxdepth 3 -type f -name package.json -path 'pillars/*/api/package.json' 2>/dev/null | sort)
          dirs=("${legacy[@]}" "${colocated[@]}")
          json='[]'
          if [ "${#dirs[@]}" -gt 0 ]; then
            json=$(printf '%s\n' "${dirs[@]}" \
              | xargs -I{} jq -r '.name' {} \
              | jq -R -s -c 'split("\n") | map(select(length > 0)) | map({name: ., short: (sub("^@pops/"; "") | sub("-api$"; ""))})')
          fi
          count=$(echo "$json" | jq 'length')
          echo "pillars=$json" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count pillar(s):"
          echo "$json" | jq .

  build:
    name: Build ${{ matrix.pillar.short }}
    needs: [discover]
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pillar: ${{ fromJson(needs.discover.outputs.pillars) }}
    steps:
      - uses: actions/checkout@v6

      # Per-pillar path filter: a finance-only change should not rebuild
      # the media/inventory/cerebrum/food/lists/core builders. Shared
      # surfaces (the Dockerfile, root manifests, the workflow file) still
      # trigger every pillar — anything else gates by pillar prefix.
      - id: pillar-changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - 'apps/pops-${{ matrix.pillar.short }}-api/**'
              - 'packages/${{ matrix.pillar.short }}-*/**'
              - 'packages/app-${{ matrix.pillar.short }}-*/**'
              - 'pillars/${{ matrix.pillar.short }}/**'
              - 'packages/db-types/**'
              - 'packages/types/**'
              - 'packages/module-registry/**'
              - 'infra/docker/pillar.Dockerfile'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.github/workflows/pillar-images.yml'

      - name: Skip — ${{ matrix.pillar.short }} unchanged
        if: github.event_name == 'pull_request' && steps.pillar-changes.outputs.relevant != 'true'
        run: echo "No ${{ matrix.pillar.short }} sources changed — skipping build."

      - uses: docker/setup-buildx-action@v3
        if: github.event_name == 'push' || steps.pillar-changes.outputs.relevant == 'true'

      - name: Build ${{ matrix.pillar.name }} (builder stage)
        if: github.event_name == 'pull_request' && steps.pillar-changes.outputs.relevant == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/pillar.Dockerfile
          target: builder
          push: false
          build-args: |
            PILLAR_PACKAGE=${{ matrix.pillar.name }}

      - name: Build ${{ matrix.pillar.name }} (full image)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/pillar.Dockerfile
          push: false
          build-args: |
            PILLAR_PACKAGE=${{ matrix.pillar.name }}
            BUILD_VERSION=${{ github.sha }}
          tags: pops-${{ matrix.pillar.short }}-api:${{ github.sha }}

  # Synthetic green job so branch protection can require this workflow
  # even when no pillars have been added yet (matrix is empty → build
  # job is skipped, which would otherwise leave the workflow incomplete).
  done:
    name: Pillar images
    needs: [discover, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarise
        run: |
          set -euo pipefail
          echo "Discovered ${{ needs.discover.outputs.count }} pillar(s)."
          if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "cancelled" ]; then
            echo "::error::Pillar build job result: ${{ needs.build.result }}"
            exit 1
          fi
          echo "Pillar build result: ${{ needs.build.result }} (skipped when no pillars exist)."
