name: Package Quality Check

on:
  workflow_call:
    inputs:
      package-path:
        description: "Path to the package (e.g. packages/app-finance)"
        type: string
        required: true
      needs-db-build:
        description: "Whether to build @pops/db-types before running checks"
        type: boolean
        default: false
      has-test:
        description: "Whether the package has a test script"
        type: boolean
        default: true
      skip:
        description: "Set to 'true' to skip all jobs (used for change detection)"
        type: string
        default: "false"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: "Skip — no relevant changes"
        if: inputs.skip == 'true'
        run: echo "Skipping — no relevant changes"
      - uses: actions/checkout@v6
        if: inputs.skip != 'true'
      - uses: pnpm/action-setup@v5
        if: inputs.skip != 'true'
      - uses: actions/setup-node@v6
        if: inputs.skip != 'true'
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: inputs.skip != 'true'
      - name: Build shared packages
        if: inputs.skip != 'true' && inputs.needs-db-build
        run: |
          pnpm --filter @pops/db-types build
          pnpm --filter @pops/types build
          pnpm --filter @pops/module-registry build
          pnpm --filter @pops/food-contracts build
          pnpm --filter @pops/core-db build
          pnpm --filter @pops/finance-db build
          pnpm --filter @pops/inventory-db build
          pnpm --filter @pops/media-db build
          pnpm --filter @pops/cerebrum-db build
          pnpm --filter @pops/food-db build
          pnpm --filter @pops/lists-db build
          pnpm --filter @pops/app-lists-db build
          pnpm --filter @pops/app-food-db build
          pnpm --filter @pops/pillar-sdk build
          pnpm --filter @pops/finance-contract build
          pnpm --filter @pops/media-contract build
      - run: cd ${{ inputs.package-path }} && pnpm typecheck
        if: inputs.skip != 'true'

  test:
    name: Test
    if: ${{ inputs.has-test }}
    runs-on: ubuntu-latest
    steps:
      - name: "Skip — no relevant changes"
        if: inputs.skip == 'true'
        run: echo "Skipping — no relevant changes"
      - uses: actions/checkout@v6
        if: inputs.skip != 'true'
      - uses: pnpm/action-setup@v5
        if: inputs.skip != 'true'
      - uses: actions/setup-node@v6
        if: inputs.skip != 'true'
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: inputs.skip != 'true'
      - name: Build shared packages
        if: inputs.skip != 'true' && inputs.needs-db-build
        run: |
          pnpm --filter @pops/db-types build
          pnpm --filter @pops/types build
          pnpm --filter @pops/module-registry build
          pnpm --filter @pops/food-contracts build
          pnpm --filter @pops/core-db build
          pnpm --filter @pops/finance-db build
          pnpm --filter @pops/inventory-db build
          pnpm --filter @pops/media-db build
          pnpm --filter @pops/cerebrum-db build
          pnpm --filter @pops/food-db build
          pnpm --filter @pops/lists-db build
          pnpm --filter @pops/app-lists-db build
          pnpm --filter @pops/app-food-db build
          pnpm --filter @pops/pillar-sdk build
          pnpm --filter @pops/finance-contract build
          pnpm --filter @pops/media-contract build
      - name: Run tests (with coverage if configured)
        if: inputs.skip != 'true'
        run: |
          cd ${{ inputs.package-path }}
          if node -e 'process.exit(require("./package.json").scripts["test:coverage"] ? 0 : 1)' 2>/dev/null; then
            pnpm test:coverage
          else
            pnpm test
          fi
