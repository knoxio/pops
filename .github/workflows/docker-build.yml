name: Docker Build

on:
  pull_request:
    paths:
      - "infra/docker*/**"
      - "infra/docker-compose*.yml"
      - "**/Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [main]
    paths:
      - "infra/docker*/**"
      - "infra/docker-compose*.yml"
      - "**/Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/docker-build.yml"

# Workflow-level filter keeps `Validate Docker builds` off docs/code-only
# PRs entirely. Per-pillar code is validated by `pillar-images.yml` and
# the `*-api-quality.yml` workflows — this job only re-validates the
# Dockerfile + compose surfaces. (Theme 13 PRD-220.)

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.docker }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - '**/Dockerfile'
              - 'infra/docker*/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.github/workflows/docker-build.yml'
            compose:
              - 'infra/docker-compose*.yml'
              - '.github/workflows/docker-build.yml'

  docker-build:
    name: Validate Docker builds
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no relevant changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No Docker-relevant changes detected — skipping"

      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

      - name: Build pops-shell (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-shell/Dockerfile .

      - name: Build pops-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-api/Dockerfile .

      - name: Build pops-mcp (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-mcp/Dockerfile .

      - name: Build pops-core-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-core-api/Dockerfile .

      - name: Build pops-inventory-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-inventory-api/Dockerfile .

      - name: Build pops-media-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-media-api/Dockerfile .

      - name: Build pops-finance-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-finance-api/Dockerfile .

      - name: Build pops-cerebrum-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-cerebrum-api/Dockerfile .

      - name: Build pops-food-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-food-api/Dockerfile .

      - name: Build pops-lists-api (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: docker build --target builder -f apps/pops-lists-api/Dockerfile .

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no compose changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.compose != 'true'
        run: echo "No compose changes detected — skipping"

      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'

      - name: Stub secret files referenced by compose
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'
        run: |
          mkdir -p secrets
          for f in notion_api_token up_bank_token up_webhook_secret claude_api_key \
                   telegram_bot_token telegram_bot_token_dev finance_api_key pops_api_key \
                   tmdb_api_key thetvdb_api_key \
                   paperless_secret_key paperless_admin_password; do
            : > "secrets/$f"
          done

      - name: Validate production compose
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Validate dev compose
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'
        run: docker compose -f infra/docker-compose.dev.yml config --quiet
