name: Docker Build

on:
  pull_request:
    paths:
      - "infra/docker*/**"
      - "infra/docker-compose*.yml"
      - "**/Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [main]
    paths:
      - "infra/docker*/**"
      - "infra/docker-compose*.yml"
      - "**/Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/docker-build.yml"

# Workflow-level filter keeps `Validate Docker builds` off docs/code-only
# PRs entirely. Per-pillar full images are also validated by the
# `*-quality.yml` workflows — this job re-validates every Dockerfile +
# compose surface in one place, gated on changes. (Theme 13 PRD-220.)

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.docker }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - '**/Dockerfile'
              - 'infra/docker*/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - '.github/workflows/docker-build.yml'
            compose:
              - 'infra/docker-compose*.yml'
              - '.github/workflows/docker-build.yml'

  docker-build:
    name: Validate Docker builds
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no relevant changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "No Docker-relevant changes detected — skipping"

      - uses: actions/checkout@v7
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

      - name: Build app Dockerfiles + every pillar Dockerfile (builder stage)
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        # Pillars are discovered from disk (`pillars/<x>/Dockerfile`) rather
        # than a static list, so adding or removing a pillar needs no edit
        # here. The builder stage is enough to surface a broken Dockerfile;
        # the `*-quality.yml` workflows + publish-images own the full image.
        run: |
          set -euo pipefail
          docker build --target builder -f pillars/shell/Dockerfile .
          docker build --target builder -f pillars/mcp/Dockerfile .
          for dockerfile in pillars/*/Dockerfile; do
            echo "::group::build ${dockerfile}"
            docker build --target builder -f "${dockerfile}" .
            echo "::endgroup::"
          done

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: Skip — no compose changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.compose != 'true'
        run: echo "No compose changes detected — skipping"

      - uses: actions/checkout@v7
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'

      - name: Stub secret files referenced by compose
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'
        run: |
          mkdir -p secrets
          for f in notion_api_token up_bank_token up_webhook_secret claude_api_key \
                   telegram_bot_token telegram_bot_token_dev finance_api_key pops_api_key \
                   tmdb_api_key thetvdb_api_key \
                   paperless_secret_key paperless_admin_password; do
            : > "secrets/$f"
          done

      - name: Validate production compose
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Validate dev compose
        if: github.event_name == 'push' || needs.changes.outputs.compose == 'true'
        run: docker compose -f infra/docker-compose.dev.yml config --quiet
