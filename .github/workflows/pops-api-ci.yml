name: Finance API CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "apps/pops-api/**"
      - "packages/db-types/**"
      - ".github/workflows/pops-api-ci.yml"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/pops-api/**'
              - 'packages/db-types/**'
              - '.github/workflows/pops-api-ci.yml'

  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.relevant == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: cd packages/db-types && pnpm build

      - name: Type check
        run: cd apps/pops-api && pnpm typecheck

      - name: Lint
        run: cd apps/pops-api && pnpm lint

      - name: Format check
        run: cd apps/pops-api && pnpm format

      - name: Run unit tests
        run: cd apps/pops-api && pnpm test

      - name: Run integration tests
        run: cd apps/pops-api && pnpm test:integration

      - name: Build
        run: cd apps/pops-api && pnpm build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pops-api-build
          path: apps/pops-api/dist
          retention-days: 7
