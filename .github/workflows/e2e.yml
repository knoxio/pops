name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: cd packages/db-types && pnpm build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          cd apps/pops-shell
          npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          cd apps/pops-shell
          npx playwright install-deps

      - name: Initialize pops-api database
        run: cd apps/pops-api && pnpm dev:init
        env:
          SQLITE_PATH: ./data/pops.db

      - name: Run Playwright tests
        run: |
          cd apps/pops-shell
          pnpm test:e2e
        env:
          CI: true
          # pops-api is started by Playwright's webServer config.
          # These dummy values satisfy validation. Integration tests use named
          # envs (?env=e2e), which automatically skip external API calls —
          # no real network traffic is made during E2E tests.
          CLAUDE_API_KEY: test-dummy-key
          # Path is relative to the API server's working directory (apps/pops-api)
          SQLITE_PATH: ./data/pops.db

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/pops-shell/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: apps/pops-shell/test-results/
          retention-days: 7
