name: Workflows Quality

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/**'

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: "Skip — no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "Skipping — no workflow changes"
      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - name: Lint workflow YAML
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: npx yaml-lint .github/workflows/*.yml
