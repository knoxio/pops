name: Test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: cd packages/db-types && pnpm build

      - name: Typecheck
        run: |
          cd apps/pops-api
          pnpm typecheck

      - name: Run all backend tests
        run: |
          cd apps/pops-api
          pnpm test --run
        env:
          # Tests use in-memory DB and mocked APIs - no real credentials needed
          CLAUDE_API_KEY: test-key

      - name: Run imports module tests specifically
        run: |
          cd apps/pops-api
          pnpm test src/modules/finance/imports --run --reporter=verbose
        env:
          CLAUDE_API_KEY: test-key

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: cd packages/db-types && pnpm build

      - name: Typecheck Shell
        run: |
          cd apps/pops-shell
          pnpm typecheck

      - name: Lint Shell
        run: |
          cd apps/pops-shell
          pnpm lint

      - name: Build Shell
        run: |
          cd apps/pops-shell
          pnpm build
