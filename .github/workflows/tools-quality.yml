name: Tools Quality

on:
  push:
    branches: [main]
    paths:
      - "packages/import-tools/**"
      - ".github/workflows/tools-quality.yml"
      - ".github/workflows/_pkg-check.yml"
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/import-tools/**'
              - '.github/workflows/tools-quality.yml'
              - '.github/workflows/_pkg-check.yml'

  quality:
    needs: [changes]
    if: always()
    uses: ./.github/workflows/_pkg-check.yml
    with:
      package-path: packages/import-tools
      needs-db-build: false
      skip: ${{ github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true' }}
