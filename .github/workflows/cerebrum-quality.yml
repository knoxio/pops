name: Cerebrum Pillar Quality

# Comprehensive standalone quality gate for the collapsed cerebrum pillar.
# Runs typecheck, test, lint, format, build, OpenAPI generation, and
# Docker build for the cerebrum pillar in isolation. Triggered ONLY by
# changes that touch the pillar or its transitive @pops/* deps + the
# repo-wide tsconfig/lockfile surface.
#
# Bubble-of-happiness rule: this workflow is the one that MUST stay
# green for the cerebrum pillar. Other workflows may be red while the
# rest of the codebase still imports the dead @pops/cerebrum-* package
# names — that's deliberate and will be resolved as each consumer
# migrates to `@pops/cerebrum`.

on:
  push:
    branches: [main]
    paths:
      - "pillars/cerebrum/**"
      - "packages/pillar-sdk/**"
      - "packages/types/**"
      - "packages/cerebrum-contract/**"
      - "packages/core-contract/**"
      - "packages/media-contract/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".oxfmtrc.json"
      - ".github/workflows/cerebrum-quality.yml"
  pull_request:
    paths:
      - "pillars/cerebrum/**"
      - "packages/pillar-sdk/**"
      - "packages/types/**"
      - "packages/cerebrum-contract/**"
      - "packages/core-contract/**"
      - "packages/media-contract/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".oxfmtrc.json"
      - ".github/workflows/cerebrum-quality.yml"

concurrency:
  group: cerebrum-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Cerebrum pillar — typecheck + test + lint + format + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install (subgraph only)
        run: pnpm install --frozen-lockfile --filter "@pops/cerebrum..."

      - name: Format check
        run: pnpm exec oxfmt --check pillars/cerebrum/

      - name: Lint
        run: pnpm exec oxlint pillars/cerebrum/src

      - name: Build transitive deps
        run: pnpm --filter "@pops/cerebrum^..." build

      - name: Typecheck
        run: pnpm --filter @pops/cerebrum typecheck

      - name: Build pillar
        run: pnpm --filter @pops/cerebrum build

      - name: Verify OpenAPI snapshot is up to date
        run: |
          pnpm --filter @pops/cerebrum generate:openapi
          git diff --exit-code pillars/cerebrum/openapi/cerebrum.openapi.json

      - name: Verify manifest.generated.ts is up to date
        run: |
          pnpm --filter @pops/cerebrum generate:manifest
          git diff --exit-code pillars/cerebrum/src/contract/manifest.generated.ts

      - name: Test
        run: pnpm --filter @pops/cerebrum test

  docker:
    name: Cerebrum pillar — Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build pillar image (builder stage only — fast feedback)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pillars/cerebrum/Dockerfile
          target: builder
          push: false

      - name: Build pillar image (full)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pillars/cerebrum/Dockerfile
          push: false
          tags: pops-cerebrum:${{ github.sha }}
