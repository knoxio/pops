version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # ── Docker (infra/docker-compose.yml) ───────────────────────────────────────
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch

  # ── npm/pnpm — workspace root (covers all workspace packages) ───────────────
  # Single entry at / so dependabot runs `pnpm install` at the root and keeps
  # the shared pnpm-lock.yaml in sync. Per-directory entries cannot update the
  # root lockfile, causing ERR_PNPM_OUTDATED_LOCKFILE in CI.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 10
    groups:
      workspace-minor-patch:
        update-types:
          - minor
          - patch
