version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # ── Docker (infra/docker-compose.yml) ───────────────────────────────────────
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch

  # ── npm/pnpm — workspace root ────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    groups:
      root-minor-patch:
        update-types:
          - minor
          - patch

  # ── npm/pnpm — apps/pops-api ─────────────────────────────────────────────────
