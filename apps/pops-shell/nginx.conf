server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver for variable-form `proxy_pass`. Upstreams held in an
    # nginx variable defer DNS resolution to request time (vs. config-
    # load time for literal `proxy_pass <name>`), letting nginx boot
    # even when an optional pillar container is missing. The per-pillar
    # `/<pillar>-api/` REST blocks below and the `/pillars` proxy use
    # the variable form; any remaining literal `proxy_pass` (e.g. the
    # `/media/images/` byte route) still hard-fails the boot if its host is
    # unreachable, so new optional upstreams must adopt the variable
    # form to inherit the boot-resilience.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Per-pillar REST surfaces (pillar migration cutover, generated) ──
    #
    # GENERATED FILE — do not hand-edit. Source:
    #   apps/pops-shell/scripts/generate-nginx-conf.ts
    #
    # Each collapsed pillar now serves an idiomatic REST contract at root
    # on its own container (`/health`, `/pillars`, `/openapi`, plus its
    # resource routes). The Hey API clients post to the shell's
    # `/<pillar>-api/...` prefix (e.g. `/media-api/...`, `/core-api/...`);
    # each block strips the `/<pillar>-api` prefix so the pillar's own
    # router sees its natural paths, then proxies to the pillar container.
    #
    # Variable-form `proxy_pass` defers DNS to request time so pops-shell
    # still boots when a pillar container is absent; calls 502 until the
    # upstream is in place.

    location /core-api/ {
        set $core_api_upstream http://core-api:3001;
        rewrite ^/core-api/(.*)$ /$1 break;
        proxy_pass $core_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    location /inventory-api/ {
        set $inventory_api_upstream http://inventory-api:3002;
        rewrite ^/inventory-api/(.*)$ /$1 break;
        proxy_pass $inventory_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    location /media-api/ {
        set $media_api_upstream http://media-api:3003;
        rewrite ^/media-api/(.*)$ /$1 break;
        proxy_pass $media_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    location /finance-api/ {
        set $finance_api_upstream http://finance-api:3004;
        rewrite ^/finance-api/(.*)$ /$1 break;
        proxy_pass $finance_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    location /food-api/ {
        set $food_api_upstream http://food-api:3005;
        rewrite ^/food-api/(.*)$ /$1 break;
        proxy_pass $food_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    location /lists-api/ {
        set $lists_api_upstream http://lists-api:3006;
        rewrite ^/lists-api/(.*)$ /$1 break;
        proxy_pass $lists_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    location /cerebrum-api/ {
        set $cerebrum_api_upstream http://cerebrum-api:3007;
        rewrite ^/cerebrum-api/(.*)$ /$1 break;
        proxy_pass $cerebrum_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    # ── Federated-search orchestrator (ADR-029, epic 06) ──
    #
    # Non-pillar cross-cutting service: federates search over the pillars
    # and serves `POST /search` at root. The shell's global search panel
    # posts to `/orchestrator-api/...`; strip the prefix so the
    # orchestrator router sees its natural paths, then proxy to the
    # variable-form upstream (boots even when the orchestrator is absent).

    location /orchestrator-api/ {
        rewrite ^/orchestrator-api/(.*)$ /$1 break;
        set $orchestrator_api_upstream http://pops-orchestrator:3009;
        proxy_pass $orchestrator_api_upstream;
        include /etc/nginx/snippets/_pillar-proxy.conf;
    }

    # Relocated raw routes (02): Up Bank webhook → finance pillar; inventory
    # photo/document byte routes → inventory pillar. Variable-form proxy_pass
    # so pops-shell still boots when an upstream is absent.
    location /webhooks/up {
        set $up_webhook_upstream http://finance-api:3004;
        proxy_pass $up_webhook_upstream;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location ~ ^/(api/inventory|inventory/documents)/ {
        set $inventory_upstream http://inventory-api:3002;
        proxy_pass $inventory_upstream;
        proxy_set_header Host $host;
    }

    # Proxy media images (posters, backdrops) served by the media pillar
    # On-demand downloads from TMDB/TVDB may take a few seconds on first request
    # Cache headers are set by the API — don't override with expires/add_header
    location /media/images/ {
        proxy_pass http://media-api:3003/media/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Proxy health check — served by the core pillar. Variable-form so the
    # shell still boots when core-api is absent (the request URI flows through
    # unchanged, hitting core-api's /health).
    location /health {
        set $health_upstream http://core-api:3001;
        proxy_pass $health_upstream;
    }

    # Core pillar registry snapshot (ADR-026 phase 3 PR 4). The shell's
    # `fetchPillarRegistry` hits `/pillars` at boot; route it to core-api
    # which is the authoritative source. `/pillars/health` is served by the
    # same core pillar (the monolith aggregator that previously owned it is
    # gone after the 02 decommission).
    #
    # Regex match so /pillars and /pillars/ both reach the upstream (and
    # similarly for /pillars/health). nginx forbids a URI part on
    # `proxy_pass` inside a regex location, so the upstream is the bare
    # host:port and the original `$request_uri` flows through unchanged.
    # Both upstreams are Express with default `strict routing: off` so
    # the trailing-slash and bare variants hit the same handler.
    #
    # The core-api upstream is stored in a variable so nginx defers DNS
    # resolution to request time. Hosts that haven't yet deployed
    # `pops-core-api` would otherwise fail to boot pops-shell entirely
    # (`host not found in upstream "core-api"`); with the variable form
    # the SPA stays up and `/pillars` returns 502 until the upstream is
    # in place — the correct failure mode.
    location ~ ^/pillars/?$ {
        set $pillars_upstream http://core-api:3001;
        proxy_pass $pillars_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Core pillar registry SSE stream (PRD-163). `GET /registry/subscribe`
    # is a plain-HTTP Server-Sent-Events endpoint on the core pillar (NOT
    # a tRPC subscription). Proxy buffering is disabled and the read
    # timeout is long so the stream stays open; the handler already sets
    # `X-Accel-Buffering: no` but we pin it here too. Variable-form
    # `proxy_pass` keeps pops-shell booting when core-api is absent.
    location ~ ^/registry/subscribe/?$ {
        set $registry_subscribe_upstream http://core-api:3001;
        proxy_pass $registry_subscribe_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # NOTE: `/core.registry.{register,heartbeat,deregister}` are deliberately
    # NOT exposed by this public nginx. Pillar registration runs entirely
    # within the docker network — each pillar-api boots and POSTs directly
    # to `http://core-api:3001/core.registry.register` over the internal
    # bridge. Removing the public allow-list closes the only path an
    # external caller could have reached the registration surface from.

    location ~ ^/pillars/health/?$ {
        set $pillars_health_upstream http://core-api:3001;
        proxy_pass $pillars_health_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # API docs browser — Theme 13 PRD-219.
    #
    # `pops-docs` is a tiny static nginx image serving Stoplight Elements
    # pointed at every contract package's OpenAPI snapshot. Variable-form
    # `proxy_pass` so pops-shell still boots if pops-docs is absent
    # (consistent with the rest of this file); requests to `/docs/` 502
    # in that case instead of failing the shell container.
    #
    # The trailing slash on `proxy_pass` strips the `/docs/` prefix
    # before forwarding so pops-docs's own nginx serves `/`, `/catalog.json`,
    # `/openapi/<pillar>.json`, and `/healthz` at their natural paths.
    location /docs/ {
        set $pops_docs_upstream http://pops-docs:80;
        proxy_pass $pops_docs_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
