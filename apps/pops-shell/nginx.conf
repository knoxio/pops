server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve upstream hostnames at request time (via Docker's embedded
    # DNS) rather than at config-load time. Without this, nginx refuses
    # to start whenever any referenced upstream container is missing
    # from the compose stack — which was happening on hosts that hadn't
    # yet been updated to deploy the new pillar API services. The SPA
    # itself stays up; routes whose upstream is genuinely down will
    # 502, which is the correct failure mode.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy tRPC API requests to pops-api
    # Sync mutations (movies, TV, watchlist) can take several minutes for large libraries
    location /trpc {
        proxy_pass http://pops-api:3000/trpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Proxy media images (posters, backdrops) served by pops-api
    # On-demand downloads from TMDB/TVDB may take a few seconds on first request
    # Cache headers are set by the API — don't override with expires/add_header
    location /media/images/ {
        proxy_pass http://pops-api:3000/media/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Proxy health check
    location /health {
        proxy_pass http://pops-api:3000/health;
    }

    # Core pillar registry snapshot (ADR-026 phase 3 PR 4). The shell's
    # `fetchPillarRegistry` hits `/pillars` at boot; route it to core-api
    # which is the authoritative source. /pillars/health lives on pops-api
    # for now because the aggregator probe still depends on its internal
    # service registry; that endpoint moves to core-api when the
    # dispatcher migrates.
    #
    # Regex match so /pillars and /pillars/ both reach the upstream (and
    # similarly for /pillars/health). nginx forbids a URI part on
    # `proxy_pass` inside a regex location, so the upstream is the bare
    # host:port and the original `$request_uri` flows through unchanged.
    # Both upstreams are Express with default `strict routing: off` so
    # the trailing-slash and bare variants hit the same handler.
    #
    # The core-api upstream is stored in a variable so nginx defers DNS
    # resolution to request time. Hosts that haven't yet deployed
    # `pops-core-api` would otherwise fail to boot pops-shell entirely
    # (`host not found in upstream "core-api"`); with the variable form
    # the SPA stays up and `/pillars` returns 502 until the upstream is
    # in place — the correct failure mode.
    location ~ ^/pillars/?$ {
        set $pillars_upstream http://core-api:3001;
        proxy_pass $pillars_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    location ~ ^/pillars/health/?$ {
        proxy_pass http://pops-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

