<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Quick Salsa</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "Recipe",
        "name": "Quick Tomato Salsa",
        "recipeYield": "2 cups",
        "prepTime": "10 minutes",
        "cookTime": "0 minutes",
        "recipeIngredient": [
          "4 large tomatoes",
          "1 onion",
          "2 cloves garlic",
          "1 jalapeno",
          "1 lime",
          "10g cilantro",
          "salt"
        ],
        "recipeInstructions": [
          { "@type": "HowToStep", "text": "Chop everything finely." },
          { "@type": "HowToStep", "text": "Combine in a bowl." },
          { "@type": "HowToStep", "text": "Squeeze lime juice over; salt to taste." }
        ]
      }
    </script>
  </head>
  <body>
    <h1>Quick Tomato Salsa</h1>
  </body>
</html>
