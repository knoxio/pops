<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Banana Bread</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "WebPage",
        "mainEntity": {
          "@type": "Recipe",
          "name": "Banana Bread",
          "recipeYield": "1 loaf",
          "prepTime": "PT10M",
          "cookTime": "PT55M",
          "recipeIngredient": [
            "3 ripe bananas",
            "75g melted butter",
            "150g sugar",
            "1 egg",
            "5g vanilla extract",
            "5g baking soda",
            "1 pinch salt",
            "190g all-purpose flour"
          ],
          "recipeInstructions": [
            { "@type": "HowToStep", "text": "Mash bananas in a large bowl." },
            { "@type": "HowToStep", "text": "Stir in butter, sugar, egg, and vanilla." },
            { "@type": "HowToStep", "text": "Sprinkle baking soda and salt; stir." },
            { "@type": "HowToStep", "text": "Add flour and fold in." },
            { "@type": "HowToStep", "text": "Bake at 175C for 55 minutes." }
          ]
        }
      }
    </script>
  </head>
  <body>
    <h1>Banana Bread</h1>
  </body>
</html>
