---
- name: Create POPS data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pops_user }}"
    group: "{{ pops_user }}"
    mode: "0750"
  loop:
    - "{{ docker_compose_dir }}"
    - "{{ sqlite_data_dir }}"
    - "{{ paperless_data_dir }}"
    - "{{ metabase_data_dir }}"

- name: Clone or update POPS repository
  ansible.builtin.git:
    repo: "{{ pops_repo_url }}"
    dest: "{{ docker_compose_dir }}/repo"
    version: "{{ pops_branch }}"
    force: true
  become_user: "{{ pops_user }}"
  when: pops_repo_url | length > 0

- name: Template production docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    owner: "{{ pops_user }}"
    group: "{{ pops_user }}"
    mode: "0640"

- name: Build custom service images
  ansible.builtin.command:
    cmd: docker compose build --no-cache
    chdir: "{{ docker_compose_dir }}"
  changed_when: true

- name: Pull third-party images
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ docker_compose_dir }}"
  changed_when: true

- name: Start services
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ docker_compose_dir }}"
  changed_when: true

- name: Check if SQLite database exists in volume
  ansible.builtin.command:
    cmd: docker run --rm -v pops-sqlite-data:/data/sqlite alpine test -f /data/sqlite/pops.db
  register: sqlite_db_check
  failed_when: false
  changed_when: false

- name: Fail if Docker is not available
  ansible.builtin.fail:
    msg: "Docker command failed unexpectedly (exit code {{ sqlite_db_check.rc }}): {{ sqlite_db_check.stderr }}"
  when: sqlite_db_check.rc is defined and sqlite_db_check.rc > 1

- name: Initialize database if it does not exist
  ansible.builtin.command:
    cmd: >-
      docker compose run --rm finance-api
      node -e "const s=require('./dist/db/schema.js');const b=require('better-sqlite3');s.initializeSchema(b('/data/sqlite/pops.db'));console.log('Database initialized')"
    chdir: "{{ docker_compose_dir }}"
  become: true
  become_user: "{{ pops_user }}"
  when: sqlite_db_check.rc == 1
  register: db_init_result
  async: 120
  poll: 10

- name: Report database initialization failure
  ansible.builtin.fail:
    msg: "Database initialization failed: {{ db_init_result.stderr | default('unknown error') }}"
  when: db_init_result is defined and db_init_result.rc is defined and db_init_result.rc != 0
