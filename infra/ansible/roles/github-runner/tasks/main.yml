---
- name: Create runner directory
  ansible.builtin.file:
    path: '{{ github_runner_dir }}'
    state: directory
    owner: '{{ github_runner_user }}'
    group: '{{ github_runner_user }}'
    mode: '0755'

- name: Validate GitHub PAT is defined
  ansible.builtin.assert:
    that:
      - github_runner_pat is defined
      - github_runner_pat | length > 0
    fail_msg: >-
      github_runner_pat is not set. Add vault_github_runner_pat to the Ansible vault:
      ansible-vault edit infra/ansible/inventory/group_vars/pops_servers/vault.yml

- name: Store GitHub PAT for runner re-registration
  ansible.builtin.copy:
    content: '{{ github_runner_pat }}'
    dest: '{{ github_runner_dir }}/.github_pat'
    owner: root
    group: root
    mode: '0400'
  become: true
  no_log: true

- name: Deploy runner re-registration script
  ansible.builtin.template:
    src: re-register.sh.j2
    dest: '{{ github_runner_dir }}/re-register.sh'
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Check if runner binary is installed
  ansible.builtin.stat:
    path: '{{ github_runner_dir }}/config.sh'
  register: runner_installed

- name: Download GitHub runner
  ansible.builtin.get_url:
    url: 'https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-x64-{{ github_runner_version }}.tar.gz'
    dest: '/tmp/actions-runner.tar.gz'
    mode: '0644'
  when: not runner_installed.stat.exists

- name: Extract GitHub runner
  ansible.builtin.unarchive:
    src: '/tmp/actions-runner.tar.gz'
    dest: '{{ github_runner_dir }}'
    remote_src: true
    owner: '{{ github_runner_user }}'
    group: '{{ github_runner_user }}'
  when: not runner_installed.stat.exists

- name: Install runner dependencies
  ansible.builtin.command:
    cmd: './bin/installdependencies.sh'
    chdir: '{{ github_runner_dir }}'
  become: true
  changed_when: false
  when: not runner_installed.stat.exists

- name: Check if runner is already configured
  ansible.builtin.stat:
    path: '{{ github_runner_dir }}/.runner'
  register: runner_configured

- name: Register runner with GitHub
  ansible.builtin.command:
    cmd: './re-register.sh'
    chdir: '{{ github_runner_dir }}'
  become: true
  when: not runner_configured.stat.exists
  changed_when: true

- name: Re-check runner configuration state
  ansible.builtin.stat:
    path: '{{ github_runner_dir }}/.runner'
  register: runner_configured_post

- name: Check if runner service is installed
  ansible.builtin.stat:
    path: '/etc/systemd/system/{{ github_runner_service_name }}'
  register: runner_service

- name: Install runner as systemd service
  ansible.builtin.command:
    cmd: './svc.sh install {{ github_runner_user }}'
    chdir: '{{ github_runner_dir }}'
  become: true
  when:
    - runner_configured_post.stat.exists
    - not runner_service.stat.exists
  changed_when: true

- name: Create systemd drop-in directory for runner service
  ansible.builtin.file:
    path: '/etc/systemd/system/{{ github_runner_service_name }}.d'
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: runner_configured_post.stat.exists

- name: Deploy systemd drop-in for pre-start re-registration
  ansible.builtin.template:
    src: runner-override.conf.j2
    dest: '/etc/systemd/system/{{ github_runner_service_name }}.d/re-register.conf'
    owner: root
    group: root
    mode: '0644'
  when: runner_configured_post.stat.exists
  notify: Restart runner service

- name: Ensure runner service is started and enabled
  ansible.builtin.systemd:
    name: '{{ github_runner_service_name }}'
    state: started
    enabled: true
    daemon_reload: true
  become: true
  when: runner_configured_post.stat.exists
