# Full rebuild: 2026-04-04
services:
  # ── JOB QUEUE ────────────────────────────────────────────────────
  pops-redis:
    image: redis:7-alpine
    container_name: pops-redis
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - pops-redis-data:/data
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # ── BACKEND ──────────────────────────────────────────────────────

  # Registry pillar API (ADR-026, Phase 3 PR 3; the pillar formerly named
  # `core`). Sibling pillars treat the registry container as the authoritative
  # pillar registry: `GET /pillars` returns a snapshot derived from the
  # `POPS_PILLARS` env plus a synthetic `registry` entry.
  # Startup ordering is enforced by `depends_on: registry-api` (below) so
  # consumers can rely on the snapshot being available when they boot.
  #
  # DUAL-ALIAS RENAME WINDOW: the service is named `registry-api` but carries
  # the legacy `core-api` network alias on BOTH networks so a not-yet-rebuilt
  # pillar image (whose baked-in SDK default still dials `http://core-api:3001`)
  # keeps resolving to this same container. The `core-api` alias is removed
  # only after every pillar (in-tree + external) has rolled over to the
  # `registry-api` default — observed, not scheduled.
  registry-api:
    build:
      context: ..
      dockerfile: pillars/registry/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-registry:${POPS_IMAGE_TAG:-main}
    container_name: pops-registry
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      frontend:
        aliases:
          - core-api
          - registry-api
      backend:
        aliases:
          - core-api
          - registry-api
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3001'
      # S5 rename complete: the registry's SQLite is registry.db (live file
      # renamed out of band on capivara). This dev reference matches.
      REGISTRY_SQLITE_PATH: /data/sqlite/registry.db
      REGISTRY_SELF_BASE_URL: http://registry-api:3001
      # Cross-pillar registry — registry-api hosts the authoritative
      # `/pillars` snapshot that the shell's nginx proxy fans out to. The
      # seed defaults to EMPTY: every pillar self-registers over the SDK
      # transport (POPS_REGISTRY_ENABLED), so the snapshot is built from live
      # registrations, not a static list. POPS_PILLARS stays an operator
      # escape hatch for air-gapped/seed boots (the env.ts parser is retained).
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Inventory pillar API (ADR-026, Phase 3 PR 2 of the inventory track).
  # Hosts inventory.db reads/writes for locations, home_inventory,
  # fixtures, item_connections, item_documents, item_photos,
  # item_uploaded_files, and item_fixture_connections. Subsequent PRs
  # move the tRPC routers + URI dispatcher behind it.
  inventory-api:
    build:
      context: ..
      dockerfile: pillars/inventory/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-inventory:${POPS_IMAGE_TAG:-main}
    container_name: pops-inventory
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3002'
      INVENTORY_SQLITE_PATH: /data/sqlite/inventory.db
      INVENTORY_SELF_BASE_URL: http://inventory-api:3002
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3002'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Finance pillar API (ADR-026, Phase 3 PR 2 of the finance track).
  # Hosts finance.db reads/writes for the wish_list slice today;
  # subsequent slices (budgets, transactions, imports, tag rules, tag
  # vocabulary, URI dispatcher) move their tRPC routers behind it.
  finance-api:
    build:
      context: ..
      dockerfile: pillars/finance/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-finance:${POPS_IMAGE_TAG:-main}
    container_name: pops-finance
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3004'
      FINANCE_SQLITE_PATH: /data/sqlite/finance.db
      FINANCE_SELF_BASE_URL: http://finance-api:3004
      # AI telemetry sink — the @pops/ai-telemetry wrapper POSTs usage to
      # `${AI_API_URL}/ai-usage/record` (internal-token gated). Read FIRST so
      # it never collides with a self-pointing POPS_API_URL.
      AI_API_URL: http://ai-api:3008
      POPS_API_INTERNAL_TOKEN: ${POPS_API_INTERNAL_TOKEN:-}
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3004'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3004/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Media pillar API (ADR-026, Phase 3 PR 2 of the media track). Hosts
  # media.db reads/writes for the shelf_impressions slice today;
  # subsequent slices (watchlist, watch_history, comparisons, rotation,
  # debrief, …) move their tRPC routers + URI dispatcher behind it.
  media-api:
    build:
      context: ..
      dockerfile: pillars/media/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-media:${POPS_IMAGE_TAG:-main}
    container_name: pops-media-api
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3003'
      MEDIA_SQLITE_PATH: /data/sqlite/media.db
      MEDIA_SELF_BASE_URL: http://media-api:3003
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3003'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3003/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Food pillar API (ADR-026, Phase 3 PR 2 of the food track). Hosts
  # food.db reads/writes today exposes only /health + /pillars;
  # subsequent slices (recipes, ingredients, ingest, meal planning,
  # review queue, URI dispatcher) move their tRPC routers behind it.
  food-api:
    build:
      context: ..
      dockerfile: pillars/food/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-food:${POPS_IMAGE_TAG:-main}
    container_name: pops-food
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3005'
      FOOD_SQLITE_PATH: /data/sqlite/food.db
      FOOD_SELF_BASE_URL: http://food-api:3005
      # AI telemetry sink — read FIRST so it never collides with a
      # self-pointing POPS_API_URL (see @pops/ai-telemetry report-sink).
      AI_API_URL: http://ai-api:3008
      POPS_API_INTERNAL_TOKEN: ${POPS_API_INTERNAL_TOKEN:-}
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3005'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3005/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Lists pillar API (ADR-026, Phase 3 PR 2 of the lists track). Hosts
  # lists.db reads/writes today exposes only /health + /pillars;
  # subsequent slices (list CRUD, item CRUD, bulk-add, reorder,
  # URI dispatcher) move their tRPC routers behind it.
  lists-api:
    build:
      context: ..
      dockerfile: pillars/lists/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-lists:${POPS_IMAGE_TAG:-main}
    container_name: pops-lists
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3006'
      LISTS_SQLITE_PATH: /data/sqlite/lists.db
      LISTS_SELF_BASE_URL: http://lists-api:3006
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3006'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3006/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # AI Ops pillar API (PRD-055). Hosts ai.db reads/writes for the AI-ops
  # telemetry slice — observability, providers, model pricing, budgets,
  # alerts — and the cross-pillar ingest `POST /ai-usage/record`
  # (internal-token gated; the first production writer to
  # `ai_inference_log`). nginx routes /ai-api/ here on port 3008. Built
  # from the hand-written pillar Dockerfile.
  ai-api:
    build:
      context: ..
      dockerfile: pillars/ai/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-ai:${POPS_IMAGE_TAG:-main}
    container_name: pops-ai
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3008'
      AI_SQLITE_PATH: /data/sqlite/ai.db
      AI_SELF_BASE_URL: http://ai-api:3008
      # Validates `x-pops-internal-token` on `POST /ai-usage/record`. The
      # reporting pillars (finance/food/cerebrum) carry the same token.
      POPS_API_INTERNAL_TOKEN: ${POPS_API_INTERNAL_TOKEN:-}
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3008'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3008/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FOOD INGEST WORKER ───────────────────────────────────────────
  # PRD-126 — consumes the `food.ingest` BullMQ queue produced by
  # pops-api (PRD-125) and runs the per-kind ingest pipelines (PRDs
  # 127–132). Results post back to pops-api via the internal-token
  # gated `food.ingest.workerComplete` mutation. Stateless with respect
  # to SQLite — all DB writes happen server-side.
  pops-worker-food:
    build:
      context: ..
      dockerfile: pillars/food/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-food:${POPS_IMAGE_TAG:-main}
    container_name: pops-worker-food
    restart: unless-stopped
    command: ['node', 'dist/worker/worker.js']
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - backend
    volumes:
      - food-ingest-data:/data/food/ingest
    secrets:
      - claude_api_key
      - pops_api_internal_token
      # Cookie file is operator-managed (see PRD-129's runbook). Mounted
      # via a Docker secret rather than a bind-mount so an empty
      # placeholder under `infra/secrets/instagram_cookies` is enough to
      # start the stack — yt-dlp falls back to anonymous mode when the
      # file is empty, which the inbox surfaces as `auth-dead` partials.
      - instagram_cookies
    environment:
      NODE_ENV: production
      REDIS_URL: redis://pops-redis:6379
      # Results post back to the food pillar's `POST /ingest/worker-complete`
      # (internal-token gated). The worker image's client must speak REST, not
      # tRPC — tracked as a follow-up gap (worker source lives out-of-repo).
      POPS_API_URL: http://food-api:3005
      # AI telemetry sink — the worker's @pops/ai-telemetry wrapper POSTs usage
      # to `${AI_API_URL}/ai-usage/record`. Read FIRST so it never collides with
      # the self-pointing POPS_API_URL above.
      AI_API_URL: http://ai-api:3008
      # POPS_API_INTERNAL_TOKEN + ANTHROPIC_API_KEY come from
      # /run/secrets/<lowercased-name> via the internal-token convention.
      # Worker pool & rate limiting (PRD-125 contract).
      FOOD_WORKER_CONCURRENCY: ${FOOD_WORKER_CONCURRENCY:-2}
      FOOD_INGEST_TIMEOUT_SEC: ${FOOD_INGEST_TIMEOUT_SEC:-300}
      FOOD_INGEST_RATE_PER_MIN: ${FOOD_INGEST_RATE_PER_MIN:-30}
      FOOD_INGEST_DIR: /data/food/ingest
      INSTAGRAM_COOKIES_PATH: /run/secrets/instagram_cookies
      # Per-handler model overrides (PRDs 128 / 130 / 131 / 132).
      FOOD_WEB_LLM_MODEL: ${FOOD_WEB_LLM_MODEL:-claude-haiku-4-5-20251001}
      FOOD_IG_VISION_MODEL: ${FOOD_IG_VISION_MODEL:-claude-haiku-4-5-20251001}
      FOOD_SCREENSHOT_VISION_MODEL: ${FOOD_SCREENSHOT_VISION_MODEL:-claude-haiku-4-5-20251001}
      FOOD_TEXT_LLM_MODEL: ${FOOD_TEXT_LLM_MODEL:-claude-haiku-4-5-20251001}
      # Cost observability — PRD-133's logger warns when a job exceeds this.
      FOOD_INGEST_COST_CAP_PER_JOB_USD: ${FOOD_INGEST_COST_CAP_PER_JOB_USD:-0.05}
    expose:
      - '9090'
    depends_on:
      pops-redis:
        condition: service_healthy
      food-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9090/healthz']
      interval: 30s
      timeout: 5s
      retries: 3

  # Cerebrum pillar API (ADR-026). Hosts the cerebrum REST surface
  # (/health, /pillars, nudges, query, ingest, …) on port 3007. nginx
  # routes /cerebrum-api/ here. Built from the pillar Dockerfile (its
  # default CMD is the API server) — shares the image the cerebrum-worker
  # ships. No published image yet.
  cerebrum-api:
    build:
      context: ..
      dockerfile: pillars/cerebrum/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-cerebrum:${POPS_IMAGE_TAG:-main}
    container_name: pops-cerebrum-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
      - cerebrum-engrams-data:/data/cerebrum/engrams
    environment:
      NODE_ENV: production
      PORT: '3007'
      REDIS_HOST: pops-redis
      REDIS_PORT: '6379'
      CEREBRUM_SQLITE_PATH: /data/sqlite/cerebrum.db
      CEREBRUM_ENGRAMS_DIR: /data/cerebrum/engrams
      CEREBRUM_SELF_BASE_URL: http://cerebrum-api:3007
      # AI telemetry sink — read FIRST so it never collides with the
      # self-pointing POPS_API_URL cerebrum sets elsewhere.
      AI_API_URL: http://ai-api:3008
      POPS_API_INTERNAL_TOKEN: ${POPS_API_INTERNAL_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-}
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3007'
    depends_on:
      pops-redis:
        condition: service_healthy
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3007/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Cerebrum pillar worker (ADR-026). Consumes the `pops-embeddings`
  # (dense-vector index) + `pops-curation` (engram enrichment) queues the
  # cerebrum pillar produces into. Runs the SAME image the cerebrum-api
  # ships, swapping the command to the worker entrypoint. Built from the
  # pillar Dockerfile because cerebrum has no published image yet.
  cerebrum-worker:
    build:
      context: ..
      dockerfile: pillars/cerebrum/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-cerebrum:${POPS_IMAGE_TAG:-main}
    container_name: pops-cerebrum-worker
    restart: unless-stopped
    command: ['node', 'dist/worker/index.js']
    networks:
      - backend
    volumes:
      - sqlite-data:/data/sqlite
      - cerebrum-engrams-data:/data/cerebrum/engrams
    environment:
      NODE_ENV: production
      REDIS_HOST: pops-redis
      REDIS_PORT: '6379'
      CEREBRUM_SQLITE_PATH: /data/sqlite/cerebrum.db
      CEREBRUM_ENGRAMS_DIR: /data/cerebrum/engrams
      # AI telemetry sink — the worker's @pops/ai-telemetry wrapper POSTs usage
      # to `${AI_API_URL}/ai-usage/record` (internal-token gated).
      AI_API_URL: http://ai-api:3008
      POPS_API_INTERNAL_TOKEN: ${POPS_API_INTERNAL_TOKEN:-}
      # The pillar LLM + embedding clients read these straight from the
      # process env (no /run/secrets convention), so surface them here.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-}
      POPS_PILLARS: ${POPS_PILLARS:-}
    depends_on:
      pops-redis:
        condition: service_healthy

  # Contacts pillar API — the first Rust pillar (axum + sqlx + utoipa).
  # Authoritative entities store; nginx routes /contacts-api/ here on port
  # 3010. The `image:` pin + the hand-written pillars/contacts/Dockerfile
  # auto-enroll it in publish-images.yml discovery (no workflow edit). Unlike
  # the TS pillars it self-registers via POPS_REGISTRY_ENABLED=true: its Rust
  # registry transport POSTs the register/heartbeat/deregister envelopes to
  # core, trying the canonical /registry/* path then the legacy
  # /core.registry.* path on a 404.
  contacts-api:
    build:
      context: ..
      dockerfile: pillars/contacts/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-contacts:${POPS_IMAGE_TAG:-main}
    container_name: pops-contacts
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      PORT: '3010'
      CONTACTS_SQLITE_PATH: /data/sqlite/contacts.db
      CONTACTS_SELF_BASE_URL: http://contacts-api:3010
      # Opt in to registry self-registration (the Rust lifecycle is gated on
      # this, mirroring the TS SDK's POPS_REGISTRY_ENABLED).
      POPS_REGISTRY_ENABLED: 'true'
      POPS_REGISTRY_URL: ${POPS_REGISTRY_URL:-http://registry-api:3001}
      POPS_API_INTERNAL_TOKEN: ${POPS_API_INTERNAL_TOKEN:-}
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3010'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:3010/health']
      interval: 30s
      timeout: 5s
      retries: 3

  # Cross-pillar orchestrator (ADR-029, epics 06+07). Federates over the
  # pillars via @pops/pillar-sdk (REST); owns no domain DB. nginx routes
  # /orchestrator-api/ here on port 3009. Built from the app Dockerfile;
  # no published image yet.
  pops-orchestrator:
    build:
      context: ..
      dockerfile: pillars/orchestrator/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-orchestrator:${POPS_IMAGE_TAG:-main}
    container_name: pops-orchestrator
    restart: unless-stopped
    networks:
      - frontend
      - backend
    environment:
      NODE_ENV: production
      PORT: '3009'
      ORCHESTRATOR_SELF_BASE_URL: http://pops-orchestrator:3009
      POPS_PILLARS: ${POPS_PILLARS:-}
    expose:
      - '3009'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3009/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FRONTEND ─────────────────────────────────────────────────────
  pops-shell:
    image: ghcr.io/knoxio/pops-shell:${POPS_IMAGE_TAG:-main}
    container_name: pops-shell
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
    environment:
      # Registry-driven nginx (PRD-255). The entrypoint boot-renders the
      # conf from this URL and the watcher subscribes to its SSE feed; on a
      # registry outage the image falls back to the committed static conf.
      # registry-api shares the frontend network, so the in-cluster host wins.
      POPS_REGISTRY_URL: ${POPS_REGISTRY_URL:-http://registry-api:3001}
      # Surfaces the watcher's `nginx_generator_last_error_at` health state
      # (degraded on a failed re-render). Internal-only; not in `expose`.
      POPS_NGINX_HEALTH_PORT: '9090'
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:80']
      interval: 30s
      timeout: 5s
      retries: 3

  # API docs browser — Stoplight Elements pointed at every contract
  # package's OpenAPI snapshot (Theme 13 PRD-219). Purely static; the
  # `/docs/` location block in pops-shell's nginx.conf reverse-proxies
  # browser traffic here. The catalog of contracts is a build-time
  # snapshot baked into the image — redeploys reflect the contracts
  # that existed at image build time.
  pops-docs:
    image: ghcr.io/knoxio/pops-docs:${POPS_IMAGE_TAG:-main}
    container_name: pops-docs
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - frontend
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:80/healthz']
      interval: 30s
      timeout: 5s
      retries: 3

  metabase:
    image: metabase/metabase:v0.52.5
    container_name: pops-metabase
    restart: unless-stopped
    networks:
      - frontend
    volumes:
      - metabase-data:/metabase-data
      - sqlite-data:/data/sqlite:ro
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_PORT: '3000'
      JAVA_TOOL_OPTIONS: -Xmx512m
    expose:
      - '3000'

  # ── DOCUMENTS ────────────────────────────────────────────────────
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.14
    container_name: pops-paperless
    restart: unless-stopped
    networks:
      - documents
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-consume:/usr/src/paperless/consume
    secrets:
      - paperless_secret_key
      - paperless_admin_password
    environment:
      PAPERLESS_SECRET_KEY_FILE: /run/secrets/paperless_secret_key
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_URL: https://pops-paperless.${POPS_DOMAIN:-localhost}
      PAPERLESS_TIME_ZONE: Australia/Melbourne
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD_FILE: /run/secrets/paperless_admin_password
    expose:
      - '8000'
    depends_on:
      - paperless-redis

  paperless-redis:
    image: redis:7-alpine
    container_name: pops-paperless-redis
    restart: unless-stopped
    networks:
      - documents
    volumes:
      - paperless-redis:/data

  # ── MOLTBOT (on-demand) ───────────────────────────────────────────
  # Enable with:  docker compose --profile moltbot up -d
  # Required secrets under /opt/pops/secrets/ (or wherever the secrets
  # volume points): telegram_bot_token, claude_api_key, pops_api_key.
  # See pillars/moltbot/README.md for the first-run runbook.
  moltbot-validator:
    image: alpine:3.20
    container_name: pops-moltbot-validator
    profiles:
      - moltbot
    volumes:
      - ../pillars/moltbot/config/config.yml:/config/config.yml:ro
      - ../pillars/moltbot/scripts/validate-config.sh:/validate.sh:ro
    secrets:
      - telegram_bot_token
      - claude_api_key
      - pops_api_key
    command: ['/bin/sh', '/validate.sh']
    restart: 'no'

  moltbot:
    image: moltbot/moltbot:latest
    container_name: pops-moltbot
    restart: unless-stopped
    profiles:
      - moltbot
    networks:
      - backend
    volumes:
      - ../pillars/moltbot/config/config.yml:/home/node/.moltbot/config.yml:ro
      - ../pillars/moltbot/skills:/home/node/.moltbot/workspace/skills:ro
    secrets:
      - telegram_bot_token
      - claude_api_key
      - pops_api_key
    environment:
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      # NOTE: the moltbot skill prompts still describe the monolith's REST/tRPC
      # paths. Repointing the hosts is necessary but not sufficient — the finance
      # skill must drop /budgets/summary + move entities to registry-api, and the
      # cerebrum skill must switch to the pillar REST paths. Tracked as a gap.
      POPS_API_URL: http://cerebrum-api:3007
      POPS_API_KEY_FILE: /run/secrets/pops_api_key
      # Legacy aliases — the finance skill template still references these.
      FINANCE_API_URL: http://finance-api:3004
      FINANCE_API_KEY_FILE: /run/secrets/pops_api_key
    depends_on:
      moltbot-validator:
        condition: service_completed_successfully

  # ── MCP HTTP SERVER ──────────────────────────────────────────────
  # Exposes pops data as an MCP server over HTTP (port 3002).
  # Accessible on the local network and optionally via Cloudflare Tunnel.
  # Requires a service-account API key provisioned in pops-api.
  # Enable with:  docker compose --profile mcp up -d
  pops-mcp:
    image: ghcr.io/knoxio/pops-mcp:${POPS_IMAGE_TAG:-main}
    container_name: pops-mcp
    restart: unless-stopped
    profiles:
      - mcp
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    networks:
      - backend
    secrets:
      - source: pops_api_key
        mode: 0444
    environment:
      NODE_ENV: production
      # pops-mcp now reaches every pillar through the REST pillar SDK
      # (per-pillar POPS_*_API_URL with built-in docker-network defaults); the
      # legacy single POPS_API_URL tRPC client was removed in the 02 decommission.
      POPS_API_KEY_FILE: /run/secrets/pops_api_key
      MCP_PORT: '3002'
    ports:
      - '${MCP_BIND_ADDR:-0.0.0.0}:3002:3002'
    depends_on:
      registry-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── AUTO-UPDATE ──────────────────────────────────────────────────
  # Polls GHCR for new digests of pops-api / pops-worker / pops-shell
  # (any container with com.centurylinklabs.watchtower.enable=true) and
  # rolls them out automatically. Leave WATCHTOWER_POLL_INTERVAL low for
  # near-CI deploys; raise it if you'd rather batch updates.
  watchtower:
    # Pin to a specific release; latest would let the auto-updater silently
    # change underneath production and break rollouts independently of pops.
    image: containrrr/watchtower:1.7.1
    container_name: pops-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount host docker config for GHCR auth (private images).
      # Create with: docker login ghcr.io -u <user> --password-stdin <<<$PAT
      - ${DOCKER_CONFIG_DIR:-/root/.docker}:/config:ro
    environment:
      DOCKER_CONFIG: /config
      # Watchtower 1.7.1 negotiates an old Docker API by default, which
      # daemons ≥ 24 reject. 1.45 is a safe minimum for modern hosts;
      # override via .env if you're on something older.
      DOCKER_API_VERSION: '${DOCKER_API_VERSION:-1.45}'
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_INCLUDE_RESTARTING: 'true'
      WATCHTOWER_POLL_INTERVAL: '60'
      WATCHTOWER_ROLLING_RESTART: 'true'
      TZ: ${TZ:-UTC}

networks:
  frontend:
    name: pops-frontend
    driver: bridge
  backend:
    name: pops-backend
    driver: bridge
  documents:
    name: pops-documents
    driver: bridge

volumes:
  sqlite-data:
    name: pops-sqlite-data
  pops-redis-data:
    name: pops-redis-data
  metabase-data:
    name: pops-metabase-data
  paperless-data:
    name: pops-paperless-data
  paperless-media:
    name: pops-paperless-media
  paperless-consume:
    name: pops-paperless-consume
  paperless-redis:
    name: pops-paperless-redis
  food-ingest-data:
    name: pops-food-ingest-data
  cerebrum-engrams-data:
    name: pops-cerebrum-engrams-data

secrets:
  notion_api_token:
    file: ../secrets/notion_api_token
  up_bank_token:
    file: ../secrets/up_bank_token
  up_webhook_secret:
    file: ../secrets/up_webhook_secret
  claude_api_key:
    file: ../secrets/claude_api_key
  telegram_bot_token:
    file: ../secrets/telegram_bot_token
  finance_api_key:
    file: ../secrets/finance_api_key
  pops_api_key:
    file: ../secrets/pops_api_key
  pops_api_internal_token:
    file: ../secrets/pops_api_internal_token
  instagram_cookies:
    file: ../secrets/instagram_cookies
  tmdb_api_key:
    file: ../secrets/tmdb_api_key
  thetvdb_api_key:
    file: ../secrets/thetvdb_api_key
  paperless_secret_key:
    file: ../secrets/paperless_secret_key
  paperless_admin_password:
    file: ../secrets/paperless_admin_password
