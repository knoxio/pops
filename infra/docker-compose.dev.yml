# Development compose — uses local build: contexts. Production uses ghcr.io images (see mu-deploy).
services:
  # ── JOB QUEUE ────────────────────────────────────────────────────
  pops-redis:
    image: redis:7-alpine
    container_name: pops-redis
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - pops-redis-data:/data
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # ── BACKEND ──────────────────────────────────────────────────────

  # Core pillar API (ADR-026, Phase 3 PR 3). Sibling pillars treat the
  # core container as the authoritative pillar registry: `GET /pillars`
  # returns a snapshot derived from the `POPS_PILLARS` env plus a
  # synthetic `core` entry — there is no dynamic register-on-boot step.
  # Startup ordering is enforced by `depends_on: core-api` (below) so
  # consumers can rely on the snapshot being available when they boot.
  # Today the container only exposes /health + /pillars; subsequent
  # pillar splits move settings, AI Ops, and URI dispatch behind it.
  core-api:
    build:
      context: ..
      dockerfile: apps/pops-core-api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-core-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3001'
      CORE_SQLITE_PATH: /data/sqlite/core.db
      CORE_SELF_BASE_URL: http://core-api:3001
      # Cross-pillar registry — core-api hosts the authoritative
      # `/pillars` snapshot that the shell's nginx proxy fans out to,
      # so it MUST default to the full sibling list rather than empty.
      # Sibling pillars get appended (id:baseUrl,...) as they extract.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    expose:
      - '3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Inventory pillar API (ADR-026, Phase 3 PR 2 of the inventory track).
  # Hosts inventory.db reads/writes for locations, home_inventory,
  # fixtures, item_connections, item_documents, item_photos,
  # item_uploaded_files, and item_fixture_connections. Subsequent PRs
  # move the tRPC routers + URI dispatcher behind it.
  inventory-api:
    build:
      context: ..
      dockerfile: apps/pops-inventory-api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-inventory-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3002'
      INVENTORY_SQLITE_PATH: /data/sqlite/inventory.db
      INVENTORY_SELF_BASE_URL: http://inventory-api:3002
      # Cross-pillar registry. Includes core-api by default so /pillars
      # surfaces both host pillars on the synthetic-entry list.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    expose:
      - '3002'
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Finance pillar API (ADR-026, Phase 3 PR 2 of the finance track).
  # Hosts finance.db reads/writes for the wish_list slice today;
  # subsequent slices (budgets, transactions, imports, tag rules, tag
  # vocabulary, URI dispatcher) move their tRPC routers behind it.
  finance-api:
    build:
      context: ..
      dockerfile: apps/pops-finance-api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-finance-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3004'
      FINANCE_SQLITE_PATH: /data/sqlite/finance.db
      FINANCE_SELF_BASE_URL: http://finance-api:3004
      # Cross-pillar registry — included for parity with siblings even
      # though finance-api today only exposes /health.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    expose:
      - '3004'
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3004/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Media pillar API (ADR-026, Phase 3 PR 2 of the media track). Hosts
  # media.db reads/writes for the shelf_impressions slice today;
  # subsequent slices (watchlist, watch_history, comparisons, rotation,
  # debrief, …) move their tRPC routers + URI dispatcher behind it.
  media-api:
    build:
      context: ..
      dockerfile: pillars/media/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: ghcr.io/knoxio/pops-media:${POPS_IMAGE_TAG:-main}
    container_name: pops-media-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3003'
      MEDIA_SQLITE_PATH: /data/sqlite/media.db
      MEDIA_SELF_BASE_URL: http://media-api:3003
      # Cross-pillar registry. Includes core-api + inventory-api by default
      # so /pillars surfaces every host pillar on the synthetic-entry list.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    expose:
      - '3003'
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3003/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Food pillar API (ADR-026, Phase 3 PR 2 of the food track). Hosts
  # food.db reads/writes today exposes only /health + /pillars;
  # subsequent slices (recipes, ingredients, ingest, meal planning,
  # review queue, URI dispatcher) move their tRPC routers behind it.
  food-api:
    build:
      context: ..
      dockerfile: apps/pops-food-api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-food-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3005'
      FOOD_SQLITE_PATH: /data/sqlite/food.db
      FOOD_SELF_BASE_URL: http://food-api:3005
      # Cross-pillar registry — included for parity with siblings even
      # though food-api today only exposes /health.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    expose:
      - '3005'
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3005/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Lists pillar API (ADR-026, Phase 3 PR 2 of the lists track). Hosts
  # lists.db reads/writes today exposes only /health + /pillars;
  # subsequent slices (list CRUD, item CRUD, bulk-add, reorder,
  # URI dispatcher) move their tRPC routers behind it.
  lists-api:
    build:
      context: ..
      dockerfile: pillars/lists/api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-lists-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    environment:
      NODE_ENV: production
      PORT: '3006'
      LISTS_SQLITE_PATH: /data/sqlite/lists.db
      LISTS_SELF_BASE_URL: http://lists-api:3006
      # Cross-pillar registry — included for parity with siblings even
      # though lists-api today only exposes /health.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    expose:
      - '3006'
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3006/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  pops-api:
    build:
      context: ..
      dockerfile: apps/pops-api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-api
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    secrets:
      - notion_api_token
      - up_bank_token
      - up_webhook_secret
      - finance_api_key
      - claude_api_key
      - tmdb_api_key
      - thetvdb_api_key
    environment:
      NODE_ENV: production
      SQLITE_PATH: /data/sqlite/pops.db
      PORT: '3000'
      REDIS_HOST: pops-redis
      REDIS_PORT: '6379'
      # Cross-pillar registry (ADR-026 Phase 3 PR 3). Names core-api by
      # its compose hostname so pops-api's URI dispatcher can route
      # outbound `pops:core/...` traffic to the new container. Deployers
      # override POPS_PILLARS to extend with sibling pillars.
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
      # Paperless-ngx integration (optional — leave unset to disable)
      PAPERLESS_BASE_URL: ${PAPERLESS_BASE_URL:-}
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN:-}
    expose:
      - '3000'
    depends_on:
      pops-redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
      inventory-api:
        condition: service_healthy
      media-api:
        condition: service_healthy
      finance-api:
        condition: service_healthy
      food-api:
        condition: service_healthy
      lists-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  pops-worker:
    build:
      context: ..
      dockerfile: apps/pops-api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-worker
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    networks:
      - backend
    volumes:
      - sqlite-data:/data/sqlite
    secrets:
      - notion_api_token
      - up_bank_token
      - up_webhook_secret
      - finance_api_key
      - claude_api_key
      - tmdb_api_key
      - thetvdb_api_key
    environment:
      NODE_ENV: production
      SQLITE_PATH: /data/sqlite/pops.db
      REDIS_HOST: pops-redis
      REDIS_PORT: '6379'
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    depends_on:
      pops-redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
      inventory-api:
        condition: service_healthy
      media-api:
        condition: service_healthy
      finance-api:
        condition: service_healthy
      food-api:
        condition: service_healthy
      lists-api:
        condition: service_healthy

  # Cerebrum pillar worker (ADR-026). Consumes the `pops-embeddings`
  # (dense-vector index) + `pops-curation` (engram enrichment) queues the
  # cerebrum pillar produces into. Same image the cerebrum-api ships, with
  # the worker entrypoint as the command. Built from the pillar Dockerfile.
  cerebrum-worker:
    build:
      context: ..
      dockerfile: pillars/cerebrum/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-cerebrum-worker
    restart: unless-stopped
    command: ['node', 'dist/worker/index.js']
    networks:
      - backend
    volumes:
      - sqlite-data:/data/sqlite
      - cerebrum-engrams-data:/data/cerebrum/engrams
    environment:
      NODE_ENV: production
      REDIS_HOST: pops-redis
      REDIS_PORT: '6379'
      CEREBRUM_SQLITE_PATH: /data/sqlite/cerebrum.db
      CEREBRUM_ENGRAMS_DIR: /data/cerebrum/engrams
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-}
      POPS_PILLARS: ${POPS_PILLARS:-core:http://core-api:3001,inventory:http://inventory-api:3002,media:http://media-api:3003,finance:http://finance-api:3004,food:http://food-api:3005,lists:http://lists-api:3006}
    depends_on:
      pops-redis:
        condition: service_healthy

  # ── FRONTEND ─────────────────────────────────────────────────────
  pops-shell:
    build:
      context: ..
      dockerfile: apps/pops-shell/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-shell
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:80']
      interval: 30s
      timeout: 5s
      retries: 3

  # API docs browser — Stoplight Elements pointed at every contract
  # package's OpenAPI snapshot (Theme 13 PRD-219).
  pops-docs:
    build:
      context: ..
      dockerfile: apps/pops-docs/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-docs
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - '80'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:80/healthz']
      interval: 30s
      timeout: 5s
      retries: 3

  metabase:
    image: metabase/metabase:v0.52.5
    container_name: pops-metabase
    restart: unless-stopped
    networks:
      - frontend
    volumes:
      - metabase-data:/metabase-data
      - sqlite-data:/data/sqlite:ro
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_PORT: '3000'
      JAVA_TOOL_OPTIONS: -Xmx512m
    expose:
      - '3000'

  # ── DOCUMENTS ────────────────────────────────────────────────────
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.14
    container_name: pops-paperless
    restart: unless-stopped
    networks:
      - documents
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-consume:/usr/src/paperless/consume
    secrets:
      - paperless_secret_key
      - paperless_admin_password
    environment:
      PAPERLESS_SECRET_KEY_FILE: /run/secrets/paperless_secret_key
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_URL: https://pops-paperless.${POPS_DOMAIN:-localhost}
      PAPERLESS_TIME_ZONE: Australia/Melbourne
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD_FILE: /run/secrets/paperless_admin_password
    expose:
      - '8000'
    depends_on:
      - paperless-redis

  paperless-redis:
    image: redis:7-alpine
    container_name: pops-paperless-redis
    restart: unless-stopped
    networks:
      - documents
    volumes:
      - paperless-redis:/data

  # ── MCP HTTP SERVER ──────────────────────────────────────────────
  # Exposes pops data as an MCP server over HTTP (port 3002).
  # Enable with:  docker compose -f infra/docker-compose.dev.yml --profile mcp up -d pops-mcp
  pops-mcp:
    build:
      context: ..
      dockerfile: apps/pops-mcp/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: pops-mcp
    restart: unless-stopped
    profiles:
      - mcp
    networks:
      - backend
    secrets:
      - pops_api_key
    environment:
      NODE_ENV: production
      POPS_API_URL: http://pops-api:3000
      POPS_API_KEY_FILE: /run/secrets/pops_api_key
      MCP_PORT: '3002'
    ports:
      - '${MCP_BIND_ADDR:-0.0.0.0}:3002:3002'
    depends_on:
      pops-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MOLTBOT (on-demand, staging-bot dev profile) ──────────────────
  # Mounts a separate dev config (apps/moltbot/config/config.dev.yml) that
  # points at a different Telegram bot token and a separate allowed_user_ids
  # entry, so working on skills never poisons the prod conversation history.
  # Enable with:  mise moltbot:dev   (or: docker compose -f infra/docker-compose.dev.yml --profile moltbot up moltbot)
  moltbot-validator:
    image: alpine:3.20
    container_name: pops-moltbot-validator
    profiles:
      - moltbot
    volumes:
      - ../apps/moltbot/config/config.dev.yml:/config/config.yml:ro
      - ../apps/moltbot/scripts/validate-config.sh:/validate.sh:ro
    secrets:
      - telegram_bot_token_dev
      - claude_api_key
      - pops_api_key
    environment:
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token_dev
    command: ['/bin/sh', '/validate.sh']
    restart: 'no'

  moltbot:
    image: moltbot/moltbot:latest
    container_name: pops-moltbot
    restart: unless-stopped
    profiles:
      - moltbot
    networks:
      - backend
    volumes:
      - ../apps/moltbot/config/config.dev.yml:/home/node/.moltbot/config.yml:ro
      - ../apps/moltbot/skills:/home/node/.moltbot/workspace/skills:ro
    secrets:
      - telegram_bot_token_dev
      - claude_api_key
      - pops_api_key
    environment:
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token_dev
      POPS_API_URL: http://pops-api:3000
      POPS_API_KEY_FILE: /run/secrets/pops_api_key
      FINANCE_API_URL: http://pops-api:3000
      FINANCE_API_KEY_FILE: /run/secrets/pops_api_key
    depends_on:
      moltbot-validator:
        condition: service_completed_successfully

  # ── PILLAR TEMPLATE (ADR-026) ─────────────────────────────────────
  # Copy this block per pillar (food, finance, media, inventory,
  # cerebrum, core, ai). Each pillar gets its OWN service entry — no
  # shared image, no shared SQLite. See infra/docker/pillar.Dockerfile
  # for the generic build, and `.claude/pillar-migration-roadmap.md`
  # for the rollout DAG. The block below is commented because no
  # pillar packages exist yet; uncomment + rename once the first
  # pillar (core) lands.
  #
  # <pillar>-api:
  #   build:
  #     context: ..
  #     dockerfile: infra/docker/pillar.Dockerfile
  #     args:
  #       PILLAR_PACKAGE: '@pops/<pillar>-api'
  #       PILLAR_PORT: '30XX'           # pick a unique port per pillar
  #       BUILD_VERSION: ${BUILD_VERSION:-dev}
  #   container_name: pops-<pillar>-api
  #   restart: unless-stopped
  #   networks:
  #     - frontend
  #     - backend
  #   volumes:
  #     - <pillar>-sqlite-data:/data/sqlite
  #   secrets: []                        # add only the secrets this pillar needs
  #   environment:
  #     NODE_ENV: production
  #     PORT: '30XX'
  #     <PILLAR>_SQLITE_PATH: /data/sqlite/<pillar>.db
  #     # core-api hosts the pillar registry; every other pillar resolves
  #     # cross-pillar URIs against POPS_PILLARS or via the registry.
  #     POPS_PILLARS: ${POPS_PILLARS:-}
  #   expose:
  #     - '30XX'
  #   depends_on:
  #     core-api:                        # every pillar except core itself
  #       condition: service_healthy
  #   healthcheck:
  #     test:
  #       [
  #         'CMD',
  #         'node',
  #         '-e',
  #         "fetch('http://localhost:30XX/health').then(r=>{if(!r.ok)process.exit(1)})",
  #       ]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #
  # Optional worker variant — same image, different entrypoint:
  # <pillar>-worker:
  #   build:
  #     context: ..
  #     dockerfile: infra/docker/pillar.Dockerfile
  #     args:
  #       PILLAR_PACKAGE: '@pops/<pillar>-api'
  #       PILLAR_ENTRYPOINT: worker.js
  #       BUILD_VERSION: ${BUILD_VERSION:-dev}
  #   container_name: pops-<pillar>-worker
  #   restart: unless-stopped
  #   networks: [backend]
  #   volumes:
  #     - <pillar>-sqlite-data:/data/sqlite
  #   environment:
  #     NODE_ENV: production
  #     <PILLAR>_SQLITE_PATH: /data/sqlite/<pillar>.db
  #     REDIS_HOST: pops-redis
  #     REDIS_PORT: '6379'
  #   depends_on:
  #     pops-redis:
  #       condition: service_healthy

networks:
  frontend:
    name: pops-frontend
    driver: bridge
  backend:
    name: pops-backend
    driver: bridge
  documents:
    name: pops-documents
    driver: bridge

