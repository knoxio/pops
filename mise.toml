# POPS mise configuration
# Run `mise tasks` to see all available tasks
# Run `mise run <task>` or `mise <task>` to execute

[tools]
node = "24.5.0"
pnpm = "10.32.1"
rust = "stable"

[env]
# Add common environment variables here if needed
# Sensitive vars should still use .env files

# Expose the pnpm-workspace-hoisted bin dir so per-unit mise tasks can call
# bare `tsc`/`vitest`/`oxlint`/`tsx` (the §1 templates) without `pnpm exec`.
# mise has no auto node_modules/.bin injection; this is the workspace glue.
_.path = ["{{config_root}}/node_modules/.bin"]

# ============================================================================
# Root aggregate — graph-aware orchestration via `tsc -b` + pnpm filters
# ============================================================================

[tasks.install]
description = "Install all dependencies"
run = "pnpm install"

[tasks.build]
description = "Build the whole compiled TS graph in one ordered pass (^build replacement)"
run = "tsc -b tsconfig.build.json"

[tasks."build:rust"]
description = "Build the cargo workspace"
run = "cargo build --workspace"

[tasks."build:all"]
description = "Build the TS compiled graph and the Rust workspace"
depends = ["build", "build:rust"]

# Disk-discovery fan-out wrapper. mise has NO `--all` flag (verified mise
# 2026.6.x: only -C/--cd, -j/--jobs, etc.), so the matrix is this explicit
# task: it discovers every unit dir from disk and runs <task> in each.
# This mirrors the CI `find … -maxdepth 1` discovery matrix, extended one
# level to the `pillars/*/app` source-FE units so they are covered too.
#
# The source guard is load-bearing: mise merges configs UP the tree, so
# `mise run -C <unit> <task>` for a unit whose own mise.toml lacks <task>
# resolves to the ROOT task instead — and the root `typecheck`/`test` tasks
# re-invoke run-all, recursing infinitely. We therefore only run a unit's
# task when `mise tasks info` reports its Source as that unit's own
# mise.toml (i.e. the task is locally defined, not inherited).
[tasks.run-all]
description = "Run <task> in every disk-discovered unit that locally defines it"
usage = 'arg "<task>"'
run = '''
units="$(
  find pillars libs -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/mise.toml' ';' -print
  find pillars -mindepth 2 -maxdepth 2 -type d -name app -exec test -f '{}/mise.toml' ';' -print
)"
for d in $(echo "$units" | sort); do
  src="$(mise tasks info "$usage_task" -C "$d" 2>/dev/null | sed -n 's/^Source: //p')"
  case "$src" in
    */"$d"/mise.toml) mise run -C "$d" "$usage_task" || exit 1 ;;
    *) : ;;  # task absent or inherited from an ancestor — skip this unit
  esac
done
'''

[tasks.test]
description = "Run every unit's test suite (fan-out; each unit's test depends on its own build)"
run = "mise run run-all test"

[tasks."test:coverage"]
description = "Run every unit's coverage suite (fan-out)"
run = "mise run run-all test:coverage"

[tasks.typecheck]
description = "Build-check the compiled graph (tsc -b) then fan out to source units"
# `tsc -b` (not `--noEmit`): on a composite project graph, `tsc -b --noEmit`
# errors TS6310 ("referenced project may not disable emit") on a COLD graph
# (no .tsbuildinfo) — it only passed when the graph was already built. `tsc -b`
# type-checks during the (incremental) build and is cold-safe; emitted dist is
# gitignored. This is what makes the pre-push hook pass on fresh clones/worktrees.
run = "tsc -b tsconfig.build.json && mise run run-all typecheck"

[tasks.dev]
description = "Build compiled-lib deps once, then start every unit's watcher in parallel"
run = "mise run build && mise run -j 99 run-all dev"

[tasks.lint]
description = "Lint all units (oxlint is workspace-wide, no per-unit orchestration)"
run = "oxlint --type-aware"

[tasks.registry]
description = "Regenerate the module-registry static manifest (src/generated.ts)"
run = "tsx libs/module-registry/scripts/build.ts"

[tasks."openapi:generate"]
description = "Regenerate every pillar's OpenAPI snapshot + typed client (fans out to each pillar's build codegen)"
run = "mise run run-all build"

# ============================================================================
# Development Servers
# ============================================================================

[tasks."dev:pillars"]
description = "Run every pillar API in watch mode (fan-out across pillars/*)"
run = "mise run -j 99 run-all dev"

[tasks."dev:shell"]
description = "Run pops-shell Vite dev server"
dir = "pillars/shell"
run = """
pnpm install
pnpm dev
"""

[tasks."dev:mcp"]
description = "Run pops-mcp HTTP MCP server in dev mode (talks to the pillar APIs over REST)"
dir = "pillars/mcp"
run = """
pnpm install
pnpm dev
"""

[tasks."dev:storybook"]
description = "Run unified Storybook for the UI library"
dir = "libs/ui"
run = "mise run storybook"

# ============================================================================
# Quality Checks
# ============================================================================

[tasks."typecheck:pillars"]
description = "Type check every pillar (fan-out across pillars/*)"
run = "mise run run-all typecheck"

[tasks."typecheck:shell"]
description = "Type check pops-shell"
dir = "pillars/shell"
run = "mise run typecheck"

[tasks."test:watch"]
description = "Run shell tests in watch mode"
dir = "pillars/shell"
run = "pnpm run test:watch"

[tasks."test:pillars"]
description = "Run every pillar's test suite (fan-out across pillars/*)"
run = "mise run run-all test"

[tasks."test:shell"]
description = "Run pops-shell tests"
dir = "pillars/shell"
run = "mise run test"

[tasks."test:scripts"]
description = "Run the root-owned scripts/ test suite (gates CI checks under scripts/)"
# `scripts/` is root-owned tooling (CI guards, extractability checks) that is
# never extracted into a unit, so it has no per-unit mise.toml and is invisible
# to the `run-all` fan-out. The root `vitest.config.ts` includes only
# `scripts/**/*.test.ts`; this task is the entry point CI runs.
run = "vitest run scripts/"

# ============================================================================
# Database Management
# ============================================================================
#
# Post-monolith reality: each pillar owns its own SQLite file and applies
# its committed `pillars/<x>/migrations/` journal at runtime when the DB is
# opened (drizzle's `migrate()` in each pillar's `open-<x>-db.ts`). There is
# no drizzle-kit step, no shared `db:init`/`db:clear`, and no cross-domain
# seeder — those lived in the now-deleted monolith. The food pillar is the
# only one shipping a dev seeder, kept below.

[tasks."db:seed:food"]
description = "Wipe food tables only, then seed PRD-113 phase-1 food fixtures into the food pillar's dev DB"
dir = "pillars/food"
env = { SQLITE_PATH = "{{config_root}}/pillars/food/data/food.db" }
run = "pnpm db:seed:food"

# ============================================================================
# Food DSL
# ============================================================================

[tasks."food:dsl:generate"]
description = "Regenerate the Lezer parser for the recipe DSL grammar (PRD-120)"
dir = "pillars/food/app"
run = """
# lezer-generator writes BOTH `dsl-parser.ts` (parser tables) and
# `dsl-parser.terms.ts` (numeric term ids) alongside the -o target so we
# get both back from a single invocation. Commit both files together —
# they're a matched pair generated from the same `.grammar` source.
pnpm exec lezer-generator src/dsl/dsl.grammar -o src/dsl/dsl-parser.ts
echo "Regenerated src/dsl/dsl-parser.ts + dsl-parser.terms.ts — commit both alongside any grammar edits."
"""

# ============================================================================
# Docker Operations
# ============================================================================

[tasks."docker:build"]
description = "Build all Docker images"
run = "docker compose -f infra/docker-compose.dev.yml build"

[tasks."docker:up"]
description = "Start all Docker services"
run = "docker compose -f infra/docker-compose.dev.yml up -d"

[tasks."docker:down"]
description = "Stop all Docker services"
run = "docker compose -f infra/docker-compose.dev.yml down"

[tasks."docker:logs"]
description = "Show Docker logs (pass service name as arg)"
run = "docker compose -f infra/docker-compose.dev.yml logs -f $@"

[tasks."docker:config"]
description = "Validate Docker Compose configuration"
run = "docker compose -f infra/docker-compose.dev.yml config"

# ============================================================================
# Moltbot (Telegram channel — PRD-088, issue #2496)
# ============================================================================

[tasks."moltbot:validate"]
description = "Run the moltbot config + secrets validator (alpine one-shot)"
run = "docker compose -f infra/docker-compose.dev.yml --profile moltbot run --rm moltbot-validator"

[tasks."moltbot:dev"]
description = "Start moltbot in dev mode against the staging Telegram bot"
run = "docker compose -f infra/docker-compose.dev.yml --profile moltbot up -d moltbot"

[tasks."moltbot:logs"]
description = "Tail moltbot container logs (dev compose)"
run = "docker compose -f infra/docker-compose.dev.yml logs -f moltbot"

[tasks."moltbot:down"]
description = "Stop and remove the moltbot dev container"
run = "docker compose -f infra/docker-compose.dev.yml --profile moltbot down moltbot moltbot-validator"

# ============================================================================
# Redis (local development)
# ============================================================================

[tasks."redis:start"]
description = "Start local Redis container for development"
run = "docker run -d --name pops-redis -p 6379:6379 redis:7-alpine redis-server --save \"\" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru"

[tasks."redis:stop"]
description = "Stop and remove local Redis container"
run = "docker rm -f pops-redis"

[tasks."redis:cli"]
description = "Open redis-cli against the local development instance"
run = "docker exec -it pops-redis redis-cli"

# ============================================================================
# Git Worktree Helpers
# ============================================================================

[tasks."worktree:create"]
description = "Create a new git worktree (usage: BRANCH=feat/my-feature mise worktree:create)"
run = """
if [ -z "$BRANCH" ]; then
  echo "Error: BRANCH not set. Usage: BRANCH=feat/my-feature mise worktree:create"
  exit 1
fi
worktree-branch "$BRANCH"
"""

[tasks."worktree:create:deps"]
description = "Create worktree with dependency installation"
run = """
if [ -z "$BRANCH" ]; then
  echo "Error: BRANCH not set. Usage: BRANCH=feat/my-feature mise worktree:create:deps"
  exit 1
fi
worktree-branch "$BRANCH" --install-deps
"""

[tasks."worktree:remove"]
description = "Remove a git worktree (usage: BRANCH=feat/my-feature mise worktree:remove)"
run = """
if [ -z "$BRANCH" ]; then
  echo "Error: BRANCH not set. Usage: BRANCH=feat/my-feature mise worktree:remove"
  exit 1
fi
git worktree remove "../$BRANCH" && git branch -d "$BRANCH"
"""

# ============================================================================
# Utility Tasks
# ============================================================================

[tasks.clean]
description = "Clean build artifacts and dependencies"
run = """
echo "Cleaning build artifacts..."
rm -rf dist/
find . -name 'node_modules' -type d -prune -exec rm -rf '{}' +
find . -name '*.tsbuildinfo' -type f -delete
echo "Done. Run 'pnpm install' to reinstall dependencies."
"""

[tasks.setup]
description = "Initial project setup (install deps + typecheck)"
run = """
echo "Installing dependencies..."
pnpm install
echo "Type checking..."
mise run typecheck
echo "Setup complete! Run 'mise dev' to start development."
"""
