# POPS mise configuration
# Run `mise tasks` to see all available tasks
# Run `mise run <task>` or `mise <task>` to execute

[tools]
node = "24.5.0"

[env]
# Add common environment variables here if needed
# Sensitive vars should still use .env files

# ============================================================================
# Development Servers
# ============================================================================

[tasks."dev:api"]
description = "Run pops-api in dev mode with watch"
dir = "apps/pops-api"
run = """
pnpm install
pnpm dev
"""

[tasks."dev:shell"]
description = "Run pops-shell Vite dev server"
dir = "apps/pops-shell"
run = """
pnpm install
pnpm dev
"""

[tasks."dev"]
description = "Run all dev servers (using turbo)"
run = "pnpm dev"

[tasks."dev:storybook"]
description = "Run unified Storybook for all packages and apps"
dir = "apps/pops-storybook"
run = "pnpm storybook"

# ============================================================================
# Quality Checks
# ============================================================================

[tasks.typecheck]
description = "Type check all packages"
run = "pnpm typecheck"

[tasks."typecheck:api"]
description = "Type check pops-api"
dir = "apps/pops-api"
run = "pnpm typecheck"

[tasks."typecheck:shell"]
description = "Type check pops-shell"
dir = "apps/pops-shell"
run = "pnpm typecheck"

[tasks.test]
description = "Run all tests"
run = "pnpm test"

[tasks."test:watch"]
description = "Run all tests in watch mode"
run = "pnpm run test:watch"

[tasks."test:api"]
description = "Run pops-api tests"
dir = "apps/pops-api"
run = "pnpm test"

[tasks."test:shell"]
description = "Run pops-shell tests"
dir = "apps/pops-shell"
run = "pnpm test"

[tasks.lint]
description = "Lint all packages"
run = "pnpm lint"

[tasks.build]
description = "Build all packages"
run = "pnpm build"

[tasks."openapi:validate"]
description = "Validate OpenAPI annotations and spec (PRD-075 US-04)"
dir = "apps/pops-api"
run = "pnpm openapi:validate"

# ============================================================================
# Database Management
# ============================================================================

[tasks."db:init"]
description = "Initialize empty database with schema"
dir = "apps/pops-api"
run = "pnpm dev:init"

[tasks."db:clear"]
description = "Wipe all application tables, then restore bare-minimum system rows (tags, Manual Queue)"
dir = "apps/pops-api"
run = "pnpm db:clear"

[tasks."db:seed"]
description = "Full wipe (all app tables) then seed comprehensive cross-domain test data"
dir = "apps/pops-api"
run = "pnpm db:seed"

# ============================================================================
# Drizzle ORM
# ============================================================================

[tasks."drizzle:generate"]
description = "Generate Drizzle migrations from schema changes"
dir = "apps/pops-api"
run = "pnpm exec drizzle-kit generate"

[tasks."drizzle:migrate"]
description = "Apply pending Drizzle migrations"
dir = "apps/pops-api"
run = "pnpm exec drizzle-kit migrate"

[tasks."drizzle:studio"]
description = "Open Drizzle Studio (DB browser)"
dir = "apps/pops-api"
run = "pnpm exec drizzle-kit studio"

# ============================================================================
# Import Tools (run from packages/import-tools)
# ============================================================================

[tasks."import:anz"]
description = "Import ANZ CSV (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = """
if [ -z "$CSV_PATH" ]; then
  echo "Error: CSV_PATH not set. Usage: CSV_PATH=path/to/file.csv mise import:anz [--execute]"
  exit 1
fi
pnpm import:anz --csv "$CSV_PATH" "$@"
"""

[tasks."import:amex"]
description = "Import Amex CSV (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = """
if [ -z "$CSV_PATH" ]; then
  echo "Error: CSV_PATH not set. Usage: CSV_PATH=path/to/file.csv mise import:amex [--execute]"
  exit 1
fi
pnpm import:amex --csv "$CSV_PATH" "$@"
"""

[tasks."import:ing"]
description = "Import ING CSV (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = """
if [ -z "$CSV_PATH" ]; then
  echo "Error: CSV_PATH not set. Usage: CSV_PATH=path/to/file.csv mise import:ing [--execute]"
  exit 1
fi
pnpm import:ing --csv "$CSV_PATH" "$@"
"""

[tasks."import:up"]
description = "Import Up Bank batch since date (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = """
if [ -z "$SINCE_DATE" ]; then
  echo "Error: SINCE_DATE not set. Usage: SINCE_DATE=2026-01-01 mise import:up [--execute]"
  exit 1
fi
pnpm import:up --since "$SINCE_DATE" "$@"
"""

[tasks."match:transfers"]
description = "Link transfer pairs (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = "pnpm match:transfers $@"

[tasks."match:novated"]
description = "Link novated lease pairs (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = "pnpm match:novated $@"

[tasks."entities:create"]
description = "Batch create entities (dry-run by default, add --execute to write)"
dir = "packages/import-tools"
run = "pnpm entities:create $@"

[tasks."entities:lookup"]
description = "Rebuild entity lookup cache"
dir = "packages/import-tools"
run = "pnpm entities:lookup"

[tasks.audit]
description = "Show database statistics"
dir = "packages/import-tools"
run = "pnpm audit"

# ============================================================================
# Docker Operations
# ============================================================================

[tasks."docker:build"]
description = "Build all Docker images"
run = "docker compose -f infra/docker-compose.dev.yml build"

[tasks."docker:up"]
description = "Start all Docker services"
run = "docker compose -f infra/docker-compose.dev.yml up -d"

[tasks."docker:down"]
description = "Stop all Docker services"
run = "docker compose -f infra/docker-compose.dev.yml down"

[tasks."docker:logs"]
description = "Show Docker logs (pass service name as arg)"
run = "docker compose -f infra/docker-compose.dev.yml logs -f $@"

[tasks."docker:config"]
description = "Validate Docker Compose configuration"
run = "docker compose -f infra/docker-compose.dev.yml config"

[tasks."docker:import"]
description = "Run import tool via Docker (e.g., mise docker:import src/import-anz.ts /data/imports/anz.csv)"
run = "docker compose -f infra/docker-compose.dev.yml --profile tools run --rm tools $@"

# ============================================================================
# Redis (local development)
# ============================================================================

[tasks."redis:start"]
description = "Start local Redis container for development"
run = "docker run -d --name pops-redis -p 6379:6379 redis:7-alpine redis-server --save \"\" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru"

[tasks."redis:stop"]
description = "Stop and remove local Redis container"
run = "docker rm -f pops-redis"

[tasks."redis:cli"]
description = "Open redis-cli against the local development instance"
run = "docker exec -it pops-redis redis-cli"

# ============================================================================
# Git Worktree Helpers
# ============================================================================

[tasks."worktree:create"]
description = "Create a new git worktree (usage: BRANCH=feat/my-feature mise worktree:create)"
run = """
if [ -z "$BRANCH" ]; then
  echo "Error: BRANCH not set. Usage: BRANCH=feat/my-feature mise worktree:create"
  exit 1
fi
worktree-branch "$BRANCH"
"""

[tasks."worktree:create:deps"]
description = "Create worktree with dependency installation"
run = """
if [ -z "$BRANCH" ]; then
  echo "Error: BRANCH not set. Usage: BRANCH=feat/my-feature mise worktree:create:deps"
  exit 1
fi
worktree-branch "$BRANCH" --install-deps
"""

[tasks."worktree:remove"]
description = "Remove a git worktree (usage: BRANCH=feat/my-feature mise worktree:remove)"
run = """
if [ -z "$BRANCH" ]; then
  echo "Error: BRANCH not set. Usage: BRANCH=feat/my-feature mise worktree:remove"
  exit 1
fi
git worktree remove "../$BRANCH" && git branch -d "$BRANCH"
"""

# ============================================================================
# Utility Tasks
# ============================================================================

[tasks.clean]
description = "Clean build artifacts and dependencies"
run = """
echo "Cleaning build artifacts..."
rm -rf dist/ .turbo/
find . -name 'node_modules' -type d -prune -exec rm -rf '{}' +
echo "Done. Run 'pnpm install' to reinstall dependencies."
"""

[tasks.install]
description = "Install all dependencies"
run = "pnpm install"

[tasks.setup]
description = "Initial project setup (install deps + typecheck)"
run = """
echo "Installing dependencies..."
pnpm install
echo "Type checking..."
pnpm typecheck
echo "Setup complete! Run 'mise dev' to start development."
"""
